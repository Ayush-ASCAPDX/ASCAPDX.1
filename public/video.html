<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Call - Orbit</title>
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Poppins", "Segoe UI", "sans-serif"]
            }
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300..700,0..1&display=swap"
    rel="stylesheet">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/style.css">
</head>

<body class="video-page font-sans antialiased">
  <div class="video-shell">
    <header class="video-call-header">
      <button class="video-header-btn" type="button" aria-label="Back to chat" onclick="window.location.href='/chat'">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <div class="video-call-title">
        <div id="remoteLabel">Remote</div>
        <div id="callStatus" class="video-status">Preparing call...</div>
      </div>
      <button class="video-header-btn" type="button" aria-label="Add participant">
        <span class="material-symbols-outlined">person_add</span>
      </button>
    </header>

    <div id="incomingBanner" class="incoming-banner hidden">
      <span id="incomingText">Incoming call...</span>
      <div class="incoming-actions">
        <button id="acceptCallBtn" class="chat-send-btn" type="button">Accept</button>
        <button id="declineCallBtn" class="danger-btn" type="button">Decline</button>
      </div>
    </div>

    <main class="video-stage">
      <section class="video-card video-remote">
        <div class="video-overlay top">
          <span id="connectionBadge" class="video-badge">Idle</span>
          <span id="timerBadge" class="video-badge">00:00</span>
          <button id="fullscreenBtn" class="video-mini-btn" type="button" aria-label="Fullscreen">
            <span class="material-symbols-outlined">open_in_full</span>
          </button>
        </div>
        <video id="remoteVideo" autoplay playsinline></video>
        <div id="remoteEmpty" class="video-empty">
          <div class="video-empty-icon">
            <span class="material-symbols-outlined">videocam</span>
          </div>
          <div class="video-empty-title">Waiting for remote video...</div>
          <div class="video-empty-sub">
            <span class="material-symbols-outlined">lock</span>
            <span>End-to-end encrypted</span>
          </div>
        </div>
      </section>

      <aside class="video-card video-local">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-overlay">
          <span class="material-symbols-outlined">mic</span>
          <span id="localMediaState">Mic on . Cam on</span>
        </div>
      </aside>
    </main>

    <footer class="video-controls">
      <button id="startCallBtn" class="video-control-btn" type="button" aria-label="Start call">
        <span class="material-symbols-outlined">cameraswitch</span>
        <span class="video-control-label">Start</span>
      </button>
      <button id="cameraBtn" class="video-control-btn" type="button" aria-label="Camera on">
        <span class="material-symbols-outlined">videocam</span>
        <span class="video-control-label">Cam On</span>
      </button>
      <button id="muteBtn" class="video-control-btn" type="button" aria-label="Microphone on">
        <span class="material-symbols-outlined">mic</span>
        <span class="video-control-label">Mic On</span>
      </button>
      <button id="endCallBtn" class="video-control-btn end" type="button" aria-label="End call">
        <span class="material-symbols-outlined">call_end</span>
        <span class="video-control-label">End</span>
      </button>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/auth.js"></script>
  <script src="/pwa.js"></script>
  <script src="/nav-loader.js"></script>
  <script src="/mobile-nav.js"></script>
  <script src="/video.js"></script>
  <script src="/call-notifications.js"></script>
</body>

</html>
