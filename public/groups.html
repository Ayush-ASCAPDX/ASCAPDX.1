<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCAPDX - Groups</title>
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #041327;
      --bg-2: #021125;
      --surface: #0f2036;
      --text: #d8e8ff;
      --muted: #9eb2cc;
      --primary: #52c6f6;
      --primary-ink: #032638;
      --border: rgba(118, 153, 194, 0.22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: radial-gradient(1200px 600px at 0% -10%, #0c294b 0%, transparent 48%), linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--text);
      font-family: "Geist", "Segoe UI", sans-serif;
      padding-bottom: 110px;
    }
    .groups-shell { width: min(980px, 100%); margin: 0 auto; padding: 12px 16px 32px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 8px 0 14px; }
    .brand-wrap { display: flex; align-items: center; gap: 12px; }
    .brand-avatar { width: 42px; height: 42px; border-radius: 999px; object-fit: cover; border: 1px solid var(--border); }
    .brand-name { font-weight: 800; font-size: 2rem; letter-spacing: -0.02em; color: #86d6ff; }
    .top-actions { display: flex; gap: 10px; align-items: center; }
    .icon-btn { width: 38px; height: 38px; border-radius: 999px; border: 1px solid transparent; background: transparent; color: #8fd5ff; font-size: 1.28rem; line-height: 1; cursor: pointer; }
    .menu-wrap { position: relative; }
    .menu-drop {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      min-width: 170px;
      border: 1px solid #355270;
      border-radius: 12px;
      background: #102238;
      padding: 6px;
      display: none;
      z-index: 40;
    }
    .menu-drop.open { display: block; }
    .menu-item {
      width: 100%;
      border: none;
      background: transparent;
      color: #dbe8f8;
      border-radius: 8px;
      text-align: left;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .menu-item:hover { background: #1e3757; }
    .search-wrap { display: none; }
    .search-overlay {
      position: fixed;
      inset: 0;
      z-index: 70;
      background: linear-gradient(180deg, #041327 0%, #021125 100%);
      padding: 8px 10px 0;
      display: none;
    }
    .search-overlay.open { display: block; }
    .search-head {
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .search-back {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: #d1e4fb;
      font-size: 1.15rem;
      cursor: pointer;
    }
    .search-field {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(18, 36, 60, 0.7);
      padding: 10px 12px;
      color: var(--text);
      width: 100%;
      outline: none;
      font-size: 0.94rem;
    }
    .search-field::placeholder { color: #7f96b2; }
    .recent-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: #d7e6fb;
      font-weight: 600;
    }
    .clear-recent {
      border: none;
      border-radius: 999px;
      background: #2a3644;
      color: #d8e8ff;
      padding: 8px 12px;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .recent-list { display: flex; flex-direction: column; gap: 8px; }
    .recent-item {
      display: grid;
      grid-template-columns: 40px 1fr 28px;
      gap: 8px;
      align-items: center;
      padding: 6px 0;
    }
    .recent-avatar {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid #294766;
    }
    .recent-title { color: #e4f0ff; font-weight: 600; font-size: 0.95rem; }
    .recent-sub { color: #93abc5; font-size: 0.82rem; }
    .recent-remove {
      border: none;
      background: transparent;
      color: #93abc5;
      font-size: 1rem;
      cursor: pointer;
    }
    .heading-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; }
    .heading-row h2 { margin: 0; font-size: 2.6rem; letter-spacing: -0.02em; }
    .create-btn { border: none; border-radius: 999px; padding: 12px 22px; background: var(--primary); color: var(--primary-ink); font-family: "JetBrains Mono", monospace; font-size: 1.08rem; letter-spacing: 0.04em; cursor: pointer; }
    .status-row { min-height: 20px; margin-bottom: 8px; color: #b9cbe2; font-size: 0.88rem; font-family: "JetBrains Mono", monospace; }
    .group-list { display: flex; flex-direction: column; gap: 8px; }
    .discover-item {
      border: 1px solid #d5e3ff;
      border-radius: 14px;
      background: #fbfdff;
      padding: 10px;
      display: grid;
      grid-template-columns: 38px 1fr auto;
      gap: 4px 8px;
      align-items: center;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .discover-item:hover {
      border-color: #93b8ff;
      box-shadow: 0 10px 22px rgba(59, 130, 246, 0.14);
      transform: translateY(-1px);
      background: #f4f8ff;
    }
    .discover-item-avatar {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid #c8dcff;
      object-fit: cover;
      grid-row: span 2;
    }
    .discover-item-title {
      font-size: 0.93rem;
      font-weight: 600;
      color: #12325f;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .discover-item-sub {
      color: #5d6f94;
      font-size: 0.76rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .join-btn {
      border: 1px solid #c7dbff;
      border-radius: 10px;
      background: #edf4ff;
      color: #11306b;
      padding: 6px 10px;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(2,10,20,.65);backdrop-filter:blur(4px);
      display:none;align-items:center;justify-content:center;z-index:90;padding:16px;
    }
    .modal-backdrop.open{display:flex}
    .create-modal{
      width:min(480px,100%);background:#102238;border:1px solid #38577a;border-radius:20px;
      padding:16px;color:#dce8f7;
    }
    .modal-title{margin:0 0 10px;font-size:1.15rem}
    .modal-grid{display:grid;gap:10px}
    .modal-input{
      width:100%;border:1px solid #3a5675;border-radius:12px;background:#0d1c31;color:#dce8f7;
      padding:10px 12px;outline:none
    }
    .modal-check{display:flex;gap:8px;align-items:center;color:#a8c0de;font-size:.9rem}
    .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
    .modal-btn{border:none;border-radius:10px;padding:9px 14px;cursor:pointer}
    .modal-btn.cancel{background:#1d334f;color:#bfd1e8}
    .modal-btn.submit{background:#52c6f6;color:#032638;font-weight:700}
    .modal-error{min-height:18px;margin-top:10px;font-size:.82rem;color:#fca5a5}
    .modal-error.ok{color:#86efac}
    @media (max-width: 639px) {
      body { padding-bottom: 94px; }
      .groups-shell { padding: 10px 12px 20px; }
      .topbar { padding: 4px 0 10px; }
      .brand-avatar { width: 36px; height: 36px; }
      .brand-name { font-size: 1.8rem; }
      .icon-btn { width: 34px; height: 34px; font-size: 1.1rem; }
      .search-wrap { margin-bottom: 16px; padding: 11px 12px; }
      .search-wrap input { font-size: 0.94rem; }
      .heading-row { margin-bottom: 10px; gap: 10px; }
      .heading-row h2 { font-size: 2rem; }
      .create-btn { padding: 9px 14px; font-size: 0.84rem; }
      .group-list { gap: 8px; }
      .discover-item { grid-template-columns: 34px 1fr auto; padding: 9px; }
      .discover-item-avatar { width: 34px; height: 34px; }
      .discover-item-title { font-size: 0.9rem; }
      .discover-item-sub { font-size: 0.74rem; }
      .join-btn { padding: 6px 8px; font-size: 0.72rem; }
    }
    @media (max-width: 420px) {
      .groups-shell { padding: 8px 10px 18px; }
      .brand-avatar { width: 32px; height: 32px; }
      .brand-name { font-size: 1.4rem; }
      .icon-btn { width: 30px; height: 30px; font-size: 0.98rem; }
      .search-wrap { margin-bottom: 12px; padding: 9px 10px; }
      .search-wrap span { font-size: 1rem; }
      .search-wrap input { font-size: 0.84rem; }
      .heading-row h2 { font-size: 1.45rem; }
      .create-btn { padding: 8px 10px; font-size: 0.72rem; letter-spacing: 0.02em; }
      .discover-item { grid-template-columns: 32px 1fr auto; padding: 8px; gap: 4px 6px; }
      .discover-item-avatar { width: 32px; height: 32px; }
      .discover-item-title { font-size: 0.84rem; }
      .discover-item-sub { font-size: 0.68rem; }
      .join-btn { font-size: 0.66rem; padding: 5px 7px; }
    }
    @media (min-width: 640px) { .groups-shell { padding-top: 16px; } .brand-name { font-size: 2.1rem; } .heading-row h2 { font-size: 2.2rem; } }
    .skeleton-discover {
      animation: pulse 1.5s infinite;
      pointer-events: none;
    }
    .skeleton-discover .discover-item-avatar { background: rgba(216, 228, 255, 0.6); border: none; }
    .skeleton-discover-title { height: 12px; width: 60%; background: rgba(216, 228, 255, 0.6); border-radius: 6px; margin: 4px 0; }
    .skeleton-discover-sub { height: 10px; width: 40%; background: rgba(216, 228, 255, 0.6); border-radius: 6px; }
    .skeleton-discover-btn { width: 50px; height: 26px; background: rgba(216, 228, 255, 0.6); border-radius: 10px; }
  </style>
</head>
<body class="group-ui-page">
  <div class="groups-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <img class="brand-avatar" src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?auto=format&fit=crop&w=140&q=80" alt="Profile">
        <div class="brand-name">Discover Groups</div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="openSearchBtn" style="font-size: 23px;" type="button" aria-label="Search">⌕</button>
        <div class="menu-wrap">
          <button class="icon-btn" id="groupsMenuBtn" style="font-size:23px" type="button" aria-label="Menu">⋮</button>
          <div class="menu-drop" id="groupsMenuDrop">
            <button class="menu-item" id="groupsCreateMenuBtn" type="button">+ Create Group</button>
          </div>
        </div>
      </div>
    </header>
    <div class="status-row" id="groupsStatus"></div>

    <section class="group-list" id="discoverList">
      <!-- Skeleton Loaders -->
      <div class="discover-item skeleton-discover">
        <div class="discover-item-avatar"></div>
        <div class="skeleton-discover-title"></div>
        <div class="skeleton-discover-btn" style="grid-row: span 2;"></div>
        <div class="skeleton-discover-sub"></div>
      </div>
      <div class="discover-item skeleton-discover">
        <div class="discover-item-avatar"></div>
        <div class="skeleton-discover-title"></div>
        <div class="skeleton-discover-btn" style="grid-row: span 2;"></div>
        <div class="skeleton-discover-sub"></div>
      </div>
      <div class="discover-item skeleton-discover">
        <div class="discover-item-avatar"></div>
        <div class="skeleton-discover-title"></div>
        <div class="skeleton-discover-btn" style="grid-row: span 2;"></div>
        <div class="skeleton-discover-sub"></div>
      </div>
      <div class="discover-item skeleton-discover">
        <div class="discover-item-avatar"></div>
        <div class="skeleton-discover-title"></div>
        <div class="skeleton-discover-btn" style="grid-row: span 2;"></div>
        <div class="skeleton-discover-sub"></div>
      </div>
    </section>
  </div>
  <div class="modal-backdrop" id="createGroupModal" aria-hidden="true">
    <form class="create-modal" id="createGroupForm">
      <h3 class="modal-title">Create Group</h3>
      <div class="modal-grid">
        <input class="modal-input" id="createGroupName" type="text" placeholder="Group name" required>
        <input class="modal-input" id="createGroupSlug" type="text" placeholder="Group slug (e.g. dev-talk)" required>
        <label class="modal-check">
          <input id="createGroupPrivate" type="checkbox">
          Private group
        </label>
      </div>
      <div class="modal-actions">
        <button type="button" class="modal-btn cancel" id="closeCreateModalBtn">Cancel</button>
        <button type="submit" class="modal-btn submit">Create</button>
      </div>
      <div class="modal-error" id="createGroupError"></div>
    </form>
  </div>
  <section class="search-overlay" id="groupsSearchOverlay" aria-hidden="true">
    <div class="search-head">
      <button class="search-back" id="closeSearchBtn" type="button" aria-label="Back">←</button>
      <input id="groupsSearchInput" class="search-field" type="search" placeholder="Search name or number...">
    </div>
    <div class="recent-head">
      <span>Recent searches</span>
      <button class="clear-recent" id="clearRecentBtn" type="button">Clear all</button>
    </div>
    <div class="recent-list" id="recentSearchList"></div>
  </section>

  <script src="/auth.js" defer></script>
  <script src="/groups.js" defer></script>
  <script src="/nav-loader.js" defer></script>
  <script src="/mobile-nav.js" defer></script>
</body>
</html>
