<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed - ASCAPDX</title>
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#03152a;
      --bg2:#011024;
      --surface:#172a43;
      --surface-2:#1b304b;
      --line:#2f4762;
      --text:#dbe8f8;
      --muted:#95abc5;
      --primary:#43b8ea;
      --ok:#2bd39f;
    }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Geist", sans-serif;
      color: var(--text);
      background: radial-gradient(800px 300px at 50% 0%, rgba(67,184,234,.1), transparent 70%), linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      padding-bottom: 110px;
    }
    .feed-shell { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
    .feed-header { margin-bottom: 32px; }
    .feed-title { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em; color: var(--primary); }
    .feed-container { display: flex; flex-direction: column; gap: 16px; }
    .post-card { 
      background: var(--surface); border: 1px solid var(--line); border-radius: 24px; 
      padding: 20px; transition: transform 0.2s ease;
    }
    .post-card:hover { transform: translateY(-2px); border-color: var(--primary); }
    .post-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .post-avatar { width: 44px; height: 42px; border-radius: 999px; object-fit: cover; border: 2px solid var(--line); }
    .post-meta { display: flex; flex-direction: column; }
    .post-author { font-weight: 700; color: var(--text); font-size: 1.05rem; text-decoration: none; }
    .post-author:hover { color: var(--primary); }
    .post-time { font-size: 0.8rem; color: var(--muted); font-family: "JetBrains Mono", monospace; }
    .post-content { line-height: 1.6; color: #c3d3e8; font-size: 1.1rem; word-break: break-word; }
    .post-image { width: 100%; border-radius: 16px; margin-top: 12px; border: 1px solid var(--line); }
    
    .post-actions {
      display: flex;
      gap: 16px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .like-btn, .share-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      padding: 6px 12px;
      border-radius: 12px;
      user-select: none;
    }
    .like-btn:hover { background: rgba(255, 255, 255, 0.05); color: #ff4b4b; }
    .share-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--primary); }
    .like-btn.liked { color: #ff4b4b; font-weight: 600; }
    .like-btn .heart-icon { 
      font-size: 1.2rem; 
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .like-btn.liked .heart-icon { 
      animation: heart-pop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }

    @keyframes heart-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.5); }
      100% { transform: scale(1); }
    }

    #status { text-align: center; margin-top: 20px; color: var(--muted); }
    
    @media (max-width: 480px) {
      .feed-title { font-size: 1.8rem; }
      .post-card { padding: 16px; }
      .share-user-list { max-height: 200px; }
    }

    /* Share Modal Styles */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(2, 10, 25, 0.85); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center; z-index: 2000; padding: 16px;
    }
    .modal-backdrop.open { display: flex; }
    .share-modal {
      width: min(420px, 100%); background: var(--surface); border: 1px solid var(--line); border-radius: 28px;
      padding: 24px; color: var(--text); box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    .modal-title { margin: 0 0 16px; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
    .share-label { font-size: 0.8rem; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; font-weight: 700; letter-spacing: 0.05em; }
    .share-user-list { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 6px; }
    .share-user-list::-webkit-scrollbar { width: 4px; }
    .share-user-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
    .share-user-item { 
      display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 16px; 
      cursor: pointer; transition: all 0.2s; border: 1px solid transparent; background: rgba(255,255,255,0.02);
    }
    .share-user-item:hover { background: var(--surface-2); border-color: var(--line); transform: translateX(4px); }
    .share-user-avatar { width: 36px; height: 36px; border-radius: 999px; object-fit: cover; border: 1px solid var(--line); }
    .share-user-name { font-weight: 600; font-size: 0.95rem; color: var(--text); }
    .share-divider { height: 1px; background: var(--line); margin: 20px 0; opacity: 0.15; }
    .share-external-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .external-share-btn { 
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--line); color: var(--text); 
      padding: 12px 8px; border-radius: 18px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s;
      text-decoration: none;
    }
    .external-share-btn:hover { background: var(--surface-2); border-color: var(--primary); transform: translateY(-2px); }
    .external-icon { font-size: 1.4rem; }
    .modal-actions { display: flex; justify-content: stretch; margin-top: 20px; }
    .modal-btn { width: 100%; border: none; border-radius: 16px; padding: 14px; cursor: pointer; font-weight: 700; font-size: 1rem; }
    .modal-btn.cancel { background: var(--surface-2); border: 1px solid var(--line); color: var(--text); }

    /* Context Menu Styles */
    .context-menu {
      position: fixed; display: none; z-index: 2500;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 16px; padding: 8px; min-width: 180px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .context-menu.active { display: block; }
    .context-item {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border: none; background: transparent;
      color: var(--text); cursor: pointer; border-radius: 10px;
      font-size: 0.9rem; text-align: left; transition: background 0.2s;
    }
    .context-item:hover { background: var(--surface-2); }
    .context-item.danger { color: #ff4b4b; }
    .context-item.danger:hover { background: rgba(255, 75, 75, 0.1); }
  </style>
</head>
<body>
  <div class="feed-shell">
    <header class="feed-header">
      <h1 class="feed-title">Feed</h1>
      <button class="open-create-btn" onclick="window.navigateTo ? window.navigateTo('/create-post') : window.location.href='/create-post'">+</button>
    </header>

    <div class="feed-container" id="feedContainer">
      <!-- Posts injected via JS -->
    </div>

    <div id="status">Loading updates...</div>
  </div>

  <!-- Share Modal -->
  <div class="modal-backdrop" id="shareModal" aria-hidden="true">
    <div class="share-modal">
      <h3 class="modal-title">Share Post</h3>
      <div class="share-section">
        <div class="share-label">Send to Chat</div>
        <div id="shareUserList" class="share-user-list">
          <!-- Users injected here -->
        </div>
      </div>
      <div class="share-divider"></div>
      <div class="share-label">Socials & Links</div>
      <div class="share-external-grid">
        <a href="#" class="external-share-btn" id="shareWhatsApp" target="_blank">
          <span class="external-icon">💬</span><span>WhatsApp</span>
        </a>
        <a href="#" class="external-share-btn" id="shareInstagram" target="_blank">
          <span class="external-icon">📸</span><span>Instagram</span>
        </a>
        <button class="external-share-btn" id="shareCopyLink">
          <span class="external-icon">🔗</span><span>Copy Link</span>
        </button>
      </div>
      <div class="modal-actions">
        <button type="button" class="modal-btn cancel" id="closeShareModalBtn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Post Context Menu -->
  <div id="postContextMenu" class="context-menu" aria-hidden="true">
    <button class="context-item" id="ctxLike">
      <span>❤️</span> <span id="ctxLikeText">Like Post</span>
    </button>
    <button class="context-item" id="ctxShare">
      <span>➦</span> <span>Share Post</span>
    </button>
    <button class="context-item" id="ctxCopyLink">
      <span>🔗</span> <span>Copy Link</span>
    </button>
    <button class="context-item danger" id="ctxDelete" style="display: none;">
      <span>🗑️</span> <span>Delete Post</span>
    </button>
  </div>

  <script src="/auth.js"></script>
  <script src="/feed.js"></script>
  <script src="/nav-loader.js" defer></script>
  <script src="/mobile-nav.js" defer></script>
</body>
</html>
