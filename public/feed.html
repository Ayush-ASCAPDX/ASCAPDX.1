<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <meta name="theme-color" content="#031326"/>
  <title>IndiChat Feed</title>
  <script src="/theme.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-container": "#43b8ea",
            "text-muted": "#95ABC5",
            "on-primary-container": "#00465e",
            "glass-fill": "rgba(219, 232, 248, 0.05)",
            "on-surface-variant": "#bdc8d0",
            "surface": "#021429",
            "primary": "#78d2ff",
            "accent-electric": "#43B8EA",
            "surface-deep": "#031326",
            "on-surface": "#d3e3ff",
            "surface-elevated": "#12263f"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          fontFamily: {
            display: ["Geist", "serif"],
            body: ["Geist", "sans-serif"]
          }
        }
      }
    }
  </script>
  <style>
    html,
    body {
      min-height: 100%;
      background: #031326;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
      color: #d3e3ff;
      font-family: "Geist", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .feed-shell {
      height: calc(100dvh - 116px);
      overflow-y: auto;
      background: #031326;
      padding: 0 clamp(18px, 4vw, 30px) calc(128px + env(safe-area-inset-bottom));
      overscroll-behavior: contain;
    }

    .feed-header {
      height: 116px;
      border-bottom: 1px solid rgba(172, 202, 235, 0.2);
      background: #031326;
    }

    .brand-title {
      color: #78d2ff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.1rem, 6vw, 2.95rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 #c4eeff;
    }

    .header-icon {
      color: #b7d7f6;
      font-size: 42px;
      line-height: 1;
    }

    .stories-row {
      display: flex;
      gap: clamp(18px, 4vw, 28px);
      margin: 58px auto 86px;
      overflow-x: auto;
      padding: 0 0 2px;
      scrollbar-width: none;
      scroll-snap-type: x proximity;
    }

    .stories-row::-webkit-scrollbar,
    .feed-shell::-webkit-scrollbar {
      display: none;
    }

    .story {
      flex: 0 0 84px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #d6e6ff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      line-height: 1;
      scroll-snap-align: start;
    }

    .story-avatar {
      position: relative;
      width: 84px;
      height: 84px;
      border-radius: 999px;
      padding: 4px;
      background: linear-gradient(135deg, #57cfff, #b8dcff 46%, #3fc1ec);
      box-shadow: 0 0 0 2px rgba(67, 184, 234, 0.14);
    }

    .story-avatar.is-muted {
      background: rgba(18, 38, 63, 0.9);
      box-shadow: 0 0 0 4px rgba(22, 50, 82, 0.86);
    }

    .story-avatar img {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      object-fit: cover;
      border: 3px solid #031326;
    }

    .story-add {
      position: absolute;
      right: -2px;
      bottom: 6px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #43b8ea;
      color: #063349;
      border: 3px solid #031326;
      font-size: 22px;
      font-weight: 800;
    }

    .feed-list {
      max-width: 648px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 44px;
      width: 100%;
    }

    .glass-card {
      overflow: hidden;
      border: 1px solid rgba(116, 159, 207, 0.23);
      border-radius: 22px;
      background: #13283f;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.025), 0 18px 48px rgba(0, 7, 20, 0.18);
    }

    .feed-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 30px 28px 24px;
    }

    .feed-author {
      display: flex;
      align-items: center;
      gap: 20px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .feed-avatar {
      width: 72px;
      height: 72px;
      flex: 0 0 72px;
      border-radius: 999px;
      object-fit: cover;
      border: 4px solid rgba(67, 184, 234, 0.22);
      background: #06172c;
    }

    .feed-name {
      color: #d8e8ff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .feed-name a {
      color: inherit;
      text-decoration: none;
    }

    .feed-meta {
      margin-top: 6px;
      color: #9fb4cf;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .feed-more {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      border-radius: 999px;
      color: #aebfd8;
      transition: background-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .feed-more:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #78d2ff;
    }

    .feed-body {
      padding: 0 28px 32px;
    }

    .feed-text {
      color: #d3e3ff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      line-height: 1.62;
      overflow-wrap: anywhere;
    }

    .feed-media {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      background: #06172c;
    }

    .feed-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .feed-actions {
      min-height: 104px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 0 30px;
    }

    .feed-action {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border-radius: 16px;
      padding: 12px 8px;
      color: #b4c4db;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      font-weight: 700;
      transition: background-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .feed-action .material-symbols-outlined {
      font-size: 42px;
    }

    .feed-action:hover,
    .feed-action.liked {
      color: #78d2ff;
      background: rgba(255, 255, 255, 0.04);
    }

    .feed-action:active,
    .fab:active {
      transform: scale(0.96);
    }

    .fab {
      position: fixed;
      right: 44px;
      bottom: calc(142px + env(safe-area-inset-bottom));
      z-index: 46;
      width: 102px;
      height: 102px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #43b8ea;
      color: #073249;
      box-shadow: 0 18px 42px rgba(0, 10, 24, 0.36);
      transition: transform 160ms ease;
    }

    .fab .material-symbols-outlined {
      font-size: 58px;
    }

    .status-panel {
      color: #95abc5;
      font-family: Georgia, "Times New Roman", serif;
    }

    .skeleton-card {
      pointer-events: none;
    }

    .skeleton-line,
    .skeleton-avatar,
    .skeleton-media,
    .skeleton-action {
      position: relative;
      overflow: hidden;
      background: rgba(214, 230, 255, 0.1);
    }

    .skeleton-line::after,
    .skeleton-avatar::after,
    .skeleton-media::after,
    .skeleton-action::after {
      position: absolute;
      inset: 0;
      content: "";
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(211, 227, 255, 0.16), transparent);
      animation: skeleton-shimmer 1.15s ease-in-out infinite;
    }

    .skeleton-avatar {
      width: 72px;
      height: 72px;
      flex: 0 0 72px;
      border-radius: 999px;
    }

    .skeleton-line {
      height: 16px;
      border-radius: 999px;
    }

    .skeleton-line.is-title {
      width: min(230px, 58vw);
      height: 24px;
    }

    .skeleton-line.is-meta {
      width: min(170px, 44vw);
      margin-top: 10px;
    }

    .skeleton-line.is-body {
      height: 18px;
      margin-bottom: 14px;
    }

    .skeleton-line.is-short {
      width: 64%;
    }

    .skeleton-media {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .skeleton-actions {
      min-height: 86px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: center;
      gap: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 0 30px;
    }

    .skeleton-action {
      height: 34px;
      border-radius: 999px;
    }

    @keyframes skeleton-shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    .share-dialog {
      width: min(420px, 100%);
      border-radius: 22px;
      border: 1px solid rgba(116, 159, 207, 0.25);
      background: #13283f;
      box-shadow: 0 24px 68px rgba(0, 6, 18, 0.5);
    }

    .share-tile {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      transition: background-color 160ms ease;
    }

    .share-tile:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    #postContextMenu {
      border: 1px solid rgba(116, 159, 207, 0.25);
      border-radius: 16px;
      background: #13283f;
      box-shadow: 0 20px 52px rgba(0, 6, 18, 0.45);
    }

    body .mobile-global-nav {
      height: 88px;
      padding: 8px 32px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(116, 159, 207, 0.2);
      background: rgba(14, 31, 50, 0.92);
      box-shadow: 0 -18px 42px rgba(0, 9, 22, 0.38);
    }

    body .mobile-global-nav a {
      min-width: 74px;
      color: #bfcede;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
    }

    body .mobile-global-nav a > .material-symbols-outlined {
      font-size: 36px;
    }

    body .mobile-global-nav a.bg-primary-container {
      min-width: 118px;
      border-radius: 999px;
      background: #43b8ea;
      color: #073249;
      padding: 8px 18px 7px;
      box-shadow: 0 10px 22px rgba(67, 184, 234, 0.22);
    }

    @media (min-width: 840px) {
      .feed-shell {
        padding-inline: max(30px, calc((100vw - 720px) / 2));
      }
    }

    @media (max-width: 520px) {
      .feed-header {
        height: 84px;
        padding-inline: 18px;
      }

      .feed-header > div {
        gap: 18px;
      }

      .feed-header button {
        width: 42px;
        height: 42px;
      }

      .header-icon {
        font-size: 34px;
      }

      .brand-title {
        font-size: 2rem;
      }

      .feed-shell {
        height: calc(100dvh - 84px);
        padding-inline: 18px;
        padding-bottom: calc(118px + env(safe-area-inset-bottom));
      }

      .stories-row {
        gap: 20px;
        margin-block: 34px 46px;
      }

      .story,
      .story-avatar {
        width: 72px;
      }

      .story {
        flex-basis: 72px;
        font-size: 14px;
      }

      .story-avatar {
        height: 72px;
      }

      .feed-list {
        gap: 28px;
      }

      .glass-card {
        border-radius: 20px;
      }

      .feed-card-head {
        gap: 10px;
        padding: 20px 18px 16px;
      }

      .feed-author {
        gap: 14px;
      }

      .feed-avatar {
        width: 52px;
        height: 52px;
        flex-basis: 52px;
        border-width: 3px;
      }

      .skeleton-avatar {
        width: 52px;
        height: 52px;
        flex-basis: 52px;
      }

      .feed-name {
        font-size: 21px;
      }

      .feed-meta {
        font-size: 13px;
      }

      .feed-more {
        width: 36px;
        height: 36px;
        flex-basis: 36px;
      }

      .feed-body {
        padding: 0 18px 22px;
      }

      .feed-text {
        font-size: clamp(1.12rem, 5vw, 1.35rem);
        line-height: 1.55;
      }

      .feed-actions {
        min-height: 76px;
        padding-inline: 8px;
      }

      .skeleton-actions {
        min-height: 70px;
        gap: 10px;
        padding-inline: 14px;
      }

      .feed-action {
        gap: 8px;
        font-size: 16px;
        padding-inline: 4px;
      }

      .feed-action .material-symbols-outlined {
        font-size: 34px;
      }

      .fab {
        right: 22px;
        bottom: calc(104px + env(safe-area-inset-bottom));
        width: 68px;
        height: 68px;
      }

      .fab .material-symbols-outlined {
        font-size: 42px;
      }

      body .mobile-global-nav {
        height: 56px;
        padding: 7px 12px calc(8px + env(safe-area-inset-bottom));
      }

      body .mobile-global-nav a {
        min-width: 58px;
        font-size: 13px;
      }

      body .mobile-global-nav a > .material-symbols-outlined {
        font-size: 20px;
      }

      body .mobile-global-nav a.bg-primary-container {
        min-width: 104px;
      }
    }

    @media (max-width: 380px) {
      .feed-header {
        padding-inline: 12px;
      }

      .feed-header > div {
        gap: 10px;
      }

      .brand-title {
        font-size: 1.78rem;
      }

      .header-icon {
        font-size: 30px;
      }

      .feed-shell {
        padding-inline: 12px;
      }

      .story,
      .story-avatar {
        width: 64px;
      }

      .story {
        flex-basis: 64px;
        font-size: 13px;
      }

      .story-avatar {
        height: 64px;
      }

      .story-add {
        width: 24px;
        height: 24px;
        font-size: 18px;
      }

      .feed-card-head {
        padding-inline: 14px;
      }

      .feed-author {
        gap: 10px;
      }

      .feed-avatar {
        width: 46px;
        height: 46px;
        flex-basis: 46px;
      }

      .skeleton-avatar {
        width: 46px;
        height: 46px;
        flex-basis: 46px;
      }

      .feed-name {
        font-size: 19px;
      }

      .feed-meta {
        font-size: 12px;
      }

      .feed-body {
        padding-inline: 14px;
      }

      .feed-actions {
        min-height: 68px;
        padding-inline: 4px;
      }

      .feed-action {
        gap: 5px;
        font-size: 14px;
      }

      .feed-action .material-symbols-outlined {
        font-size: 29px;
      }

      body .mobile-global-nav {
        padding-inline: 6px;
      }

      body .mobile-global-nav a {
        min-width: 48px;
        font-size: 12px;
      }

      body .mobile-global-nav a.bg-primary-container {
        min-width: 88px;
        padding-inline: 12px;
      }
    }

    @media (max-height: 700px) and (max-width: 520px) {
      .stories-row {
        margin-block: 24px 34px;
      }

      .fab {
        width: 60px;
        height: 60px;
      }
    }

    @media (max-width: 520px) {
      .feed-header {
        height: 43px;
        padding-inline: 5px;
      }

      .feed-header > div {
        gap: 9px;
      }

      .feed-header button {
        width: 24px;
        height: 24px;
      }

      .header-icon {
        font-size: 20px;
      }

      .brand-title {
        font-size: 1rem;
        text-shadow: 0 1px 0 rgba(196, 238, 255, 0.55);
      }

      .feed-shell {
        height: calc(100dvh - 43px);
        padding-inline: 4px;
        padding-bottom: calc(66px + env(safe-area-inset-bottom));
      }

      .stories-row {
        gap: 10px;
        margin-block: 18px 36px;
        padding-block: 6px 10px;
      }

      .story,
      .story-avatar {
        width: 63px;
      }

      .story {
        flex-basis: 43px;
        gap: 7px;
        font-size: 12px;
      }

      .story-avatar {
        height: 63px;
        padding: 2px;
      }

      .story-avatar img {
        border-width: 2px;
      }

      .story-add {
        right: -2px;
        bottom: 1px;
        width: 13px;
        height: 13px;
        border-width: 1px;
        font-size: 11px;
      }

      .feed-list {
        gap: 17px;
      }

      .glass-card {
        border-radius: 12px;
      }

      .feed-card-head {
        gap: 8px;
        padding: 20px 18px 14px;
      }

      .feed-author {
        gap: 12px;
      }

      .feed-avatar {
        width: 42px;
        height: 42px;
        flex-basis: 42px;
        border-width: 2px;
      }

      .skeleton-avatar {
        width: 42px;
        height: 42px;
        flex-basis: 42px;
      }

      .feed-name {
        font-size: 15px;
      }

      .feed-meta {
        margin-top: 4px;
        font-size: 11px;
      }

      .feed-more {
        width: 28px;
        height: 28px;
        flex-basis: 28px;
      }

      .feed-more .material-symbols-outlined {
        font-size: 20px;
      }

      .feed-body {
        padding: 0 18px 20px;
      }

      .feed-text {
        font-size: 16px;
        line-height: 1.58;
      }

      .feed-actions {
        min-height: 66px;
        padding-inline: 30px;
      }

      .skeleton-actions {
        min-height: 58px;
        gap: 8px;
        padding-inline: 18px;
      }

      .skeleton-line.is-title {
        height: 16px;
      }

      .skeleton-line.is-meta,
      .skeleton-line.is-body {
        height: 12px;
      }

      .skeleton-action {
        height: 24px;
      }

      .feed-action {
        gap: 10px;
        border-radius: 8px;
        padding: 8px 2px;
        font-size: 14px;
      }

      .feed-action .material-symbols-outlined {
        font-size: 30px;
      }

      .fab {
        right: 19px;
        bottom: calc(54px + env(safe-area-inset-bottom));
        width: 56px;
        height: 56px;
      }

      .fab .material-symbols-outlined {
        font-size: 35px;
      }
    }
  </style>
</head>
<body class="bg-surface-deep">
  <header class="feed-header sticky top-0 z-50 flex w-full items-center justify-between px-[30px]">
    <div class="flex items-center gap-8">
      <button class="grid h-12 w-12 place-items-center transition-transform active:scale-95" type="button" aria-label="Open menu">
        <span class="material-symbols-outlined header-icon">menu</span>
      </button>
      <h1 class="brand-title">IndiChat</h1>
    </div>
    <div class="flex items-center gap-4 feed-header-actions">
      <button class="grid h-12 w-12 place-items-center transition-transform active:scale-95" type="button" aria-label="Search feed">
        <span class="material-symbols-outlined header-icon">search</span>
      </button>
      <button class="grid h-12 w-12 place-items-center transition-transform active:scale-95" type="button" aria-label="Create post" onclick="window.navigateTo ? window.navigateTo('/create-post') : (window.location.href = '/create-post')">
        <span class="material-symbols-outlined header-icon">add</span>
      </button>
    </div>
  </header>

  <main class="feed-shell">
    <section class="stories-row" aria-label="Stories">
      <button class="story" type="button" onclick="window.navigateTo ? window.navigateTo('/create-post') : (window.location.href = '/create-post')">
        <span class="story-avatar is-muted">
          <img id="headerUserAvatar" alt="Your avatar" src="https://ui-avatars.com/api/?name=U&background=15324f&color=d3e3ff"/>
          <span class="story-add">+</span>
        </span>
        <span class="w-full truncate text-center text-[#95abc5]">Your Story</span>
      </button>
      <div class="story">
        <span class="story-avatar">
          <img alt="Sarah" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZUMjvFlM_6LCbG8i_4O59YxxvaxXXGRVpghVuHcOuqsy_kUhx4t3-139tQHmdzGJkXiQ7MCAMLEF82f_anP1nf0mHscYW9D20TlwU2xSJJCtjpwID4Gfr12v6g_xB0AECqozmP3r18o02KaIlcdZib8hL1VlhR0W1TwX-hHo_eAxwrlNOtz5rQri0sAVARipZD4wpgh4NRWrj54UYFxDgStKZb6b9JN8gQuvJZGdd1QGehsAmFOa3YLOcaVWXZKYmWULn4FdN9iBq"/>
        </span>
        <span class="w-full truncate text-center">Sarah</span>
      </div>
      <div class="story">
        <span class="story-avatar">

        </a>
