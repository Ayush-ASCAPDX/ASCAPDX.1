<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
  <meta name="theme-color" content="#031326" />
  <title>IndiChat Feed</title>
  <script src="/theme.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.min.css" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary-container": "#43b8ea",
            "text-muted": "#95ABC5",
            "on-primary-container": "#00465e",
            "glass-fill": "rgba(219, 232, 248, 0.05)",
            "on-surface-variant": "#bdc8d0",
            "surface": "#021429",
            "primary": "#78d2ff",
            "accent-electric": "#43B8EA",
            "surface-deep": "#031326",
            "on-surface": "#d3e3ff",
            "surface-elevated": "#12263f"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          fontFamily: {
            display: ["Geist", "serif"],
            body: ["Geist", "sans-serif"]
          }
        }
      }
    }
  </script>
  <style>
    html,
    body {
      min-height: 100%;
      background: #031326;
    }

    body {
      min-height: 100dvh;
      overflow: hidden;
      color: #d3e3ff;
      font-family: "Geist", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .feed-shell {
      height: calc(100dvh - 116px);
      overflow-y: auto;
      background: #031326;
      padding: 0 clamp(18px, 4vw, 30px) calc(128px + env(safe-area-inset-bottom));
      overscroll-behavior: contain;
    }

    .feed-header {
      height: 116px;
      border-bottom: 1px solid rgba(172, 202, 235, 0.2);
      background: #031326;
    }

    .brand-title {
      color: #78d2ff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.1rem, 6vw, 2.95rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 #c4eeff;
    }

    .header-icon {
      color: #b7d7f6;
      font-size: 42px;
      line-height: 1;
    }

    .stories-row {
      display: flex;
      gap: clamp(18px, 4vw, 28px);
      margin: 58px auto 86px;
      overflow-x: auto;
      padding: 0 0 2px;
      scrollbar-width: none;
      scroll-snap-type: x proximity;
    }

    .stories-row::-webkit-scrollbar,
    .feed-shell::-webkit-scrollbar {
      display: none;
    }

    .story {
      flex: 0 0 84px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: #d6e6ff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      line-height: 1;
      scroll-snap-align: start;
    }

    .story-avatar {
      position: relative;
      width: 84px;
      height: 84px;
      border-radius: 999px;
      padding: 4px;
      background: linear-gradient(135deg, #57cfff, #b8dcff 46%, #3fc1ec);
      box-shadow: 0 0 0 2px rgba(67, 184, 234, 0.14);
    }

    .story-avatar.is-muted {
      background: rgba(18, 38, 63, 0.9);
      box-shadow: 0 0 0 4px rgba(22, 50, 82, 0.86);
    }

    .story-avatar img {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      object-fit: cover;
      border: 3px solid #031326;
    }

    .story-add {
      position: absolute;
      right: -2px;
      bottom: 6px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #43b8ea;
      color: #063349;
      border: 3px solid #031326;
      font-size: 22px;
      font-weight: 800;
    }

    .feed-list {
      max-width: 648px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 44px;
      width: 100%;
    }

    .glass-card {
      overflow: hidden;
      border: 1px solid rgba(116, 159, 207, 0.23);
      border-radius: 22px;
      background: #13283f;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.025), 0 18px 48px rgba(0, 7, 20, 0.18);
    }

    .feed-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 30px 28px 24px;
    }

    .feed-author {
      display: flex;
      align-items: center;
      gap: 20px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .feed-avatar {
      width: 72px;
      height: 72px;
      flex: 0 0 72px;
      border-radius: 999px;
      object-fit: cover;
      border: 4px solid rgba(67, 184, 234, 0.22);
      background: #06172c;
    }

    .feed-name {
      color: #d8e8ff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .feed-name a {
      color: inherit;
      text-decoration: none;
    }

    .feed-meta {
      margin-top: 6px;
      color: #9fb4cf;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .feed-more {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      border-radius: 999px;
      color: #aebfd8;
      transition: background-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .feed-more:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #78d2ff;
    }

    .feed-body {
      padding: 0 28px 32px;
    }

    .feed-text {
      color: #d3e3ff;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      line-height: 1.62;
      overflow-wrap: anywhere;
    }

    .feed-media {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      background: #06172c;
    }

    .feed-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .feed-actions {
      min-height: 104px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 0 10px;
    }

    .comments-section {
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding: 22px 28px;
      background: rgba(0, 10, 24, 0.2);
    }

    .comments-list {
      max-height: 260px;
      overflow-y: auto;
      margin-bottom: 18px;
    }

    .comments-list::-webkit-scrollbar {
      width: 4px;
    }

    .comments-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
    }

    .comment-item {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      align-items: flex-start;
    }

    .comment-avatar {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 999px;
      object-fit: cover;
      border: 2px solid rgba(67, 184, 234, 0.15);
      background: #06172c;
    }

    .comment-content-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 10px 16px;
      border-radius: 16px;
      min-width: 0;
    }

    .comment-author {
      font-size: 15px;
      font-weight: 700;
      color: #78d2ff;
      margin-bottom: 2px;
    }

    .comment-text {
      font-size: 15px;
      color: #d3e3ff;
      line-height: 1.5;
      word-break: break-word;
    }

    .comment-time {
      font-size: 12px;
      color: #9fb4cf;
      margin-top: 4px;
      display: block;
    }

    .comment-form {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    .comment-input {
      flex: 1;
      background: #0d1e32;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #d3e3ff;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 15px;
      outline: none;
      transition: border-color 160ms ease;
    }

    .comment-input:focus {
      border-color: #43b8ea;
    }

    .comment-submit-btn {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(67, 184, 234, 0.1);
      color: #78d2ff;
      transition: background 160ms ease, transform 160ms ease;
    }

    .comment-submit-btn:hover {
      background: rgba(67, 184, 234, 0.2);
    }

    .comment-submit-btn:active {
      transform: scale(0.95);
    }

    .feed-action {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-radius: 16px;
      padding: 12px 4px;
      color: #b4c4db;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      font-weight: 700;
      transition: background-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .feed-action svg {
      transition: transform 160ms ease, fill 160ms ease;
    }

    .feed-action:hover,
    .feed-action.liked {
      color: #78d2ff;
      background: rgba(255, 255, 255, 0.04);
    }

    .feed-action.liked svg {
      fill: #78d2ff;
      transform: scale(1.08);
    }

    .feed-action.disliked {
      color: #ff8585;
      background: rgba(255, 255, 255, 0.04);
    }

    .feed-action.disliked svg {
      fill: #ff8585;
      transform: scale(1.08);
    }

    .feed-action:active,
    .fab:active {
      transform: scale(0.96);
    }

    .fab {
      position: fixed;
      right: 44px;
      bottom: calc(142px + env(safe-area-inset-bottom));
      z-index: 46;
      width: 102px;
      height: 102px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #43b8ea;
      color: #073249;
      box-shadow: 0 18px 42px rgba(0, 10, 24, 0.36);
      transition: transform 160ms ease;
    }

    .fab .material-symbols-outlined {
      font-size: 58px;
    }

    .status-panel {
      color: #95abc5;
      font-family: Georgia, "Times New Roman", serif;
    }

    .skeleton-card {
      pointer-events: none;
    }

    .skeleton-line,
    .skeleton-avatar,
    .skeleton-media,
    .skeleton-action {
      position: relative;
      overflow: hidden;
      background: rgba(214, 230, 255, 0.1);
    }

    .skeleton-line::after,
    .skeleton-avatar::after,
    .skeleton-media::after,
    .skeleton-action::after {
      position: absolute;
      inset: 0;
      content: "";
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(211, 227, 255, 0.16), transparent);
      animation: skeleton-shimmer 1.15s ease-in-out infinite;
    }

    .skeleton-avatar {
      width: 72px;
      height: 72px;
      flex: 0 0 72px;
      border-radius: 999px;
    }

    .skeleton-line {
      height: 16px;
      border-radius: 999px;
    }

    .skeleton-line.is-title {
      width: min(230px, 58vw);
      height: 24px;
    }

    .skeleton-line.is-meta {
      width: min(170px, 44vw);
      margin-top: 10px;
    }

    .skeleton-line.is-body {
      height: 18px;
      margin-bottom: 14px;
    }

    .skeleton-line.is-short {
      width: 64%;
    }

    .skeleton-media {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .skeleton-actions {
      min-height: 86px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: center;
      gap: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 0 30px;
    }

    .skeleton-action {
      height: 34px;
      border-radius: 999px;
    }

    @keyframes skeleton-shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    .share-dialog {
      width: min(420px, 100%);
      border-radius: 22px;
      border: 1px solid rgba(116, 159, 207, 0.25);
      background: #13283f;
      box-shadow: 0 24px 68px rgba(0, 6, 18, 0.5);
    }

    .share-tile {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      transition: background-color 160ms ease;
    }

    .share-tile:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    #postContextMenu {
      border: 1px solid rgba(116, 159, 207, 0.25);
      border-radius: 16px;
      background: #13283f;
      box-shadow: 0 20px 52px rgba(0, 6, 18, 0.45);
    }

    body .mobile-global-nav {
      height: 88px;
      padding: 8px 32px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(116, 159, 207, 0.2);
      background: rgba(14, 31, 50, 0.92);
      box-shadow: 0 -18px 42px rgba(0, 9, 22, 0.38);
    }

    body .mobile-global-nav a {
      min-width: 74px;
      color: #bfcede;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
    }

    body .mobile-global-nav a>.material-symbols-outlined {
      font-size: 36px;
    }

    body .mobile-global-nav a.bg-primary-container {
      min-width: 118px;
      border-radius: 999px;
      background: #43b8ea;
      color: #073249;
      padding: 8px 18px 7px;
      box-shadow: 0 10px 22px rgba(67, 184, 234, 0.22);
    }

    @media (min-width: 840px) {
      .feed-shell {
        padding-inline: max(30px, calc((100vw - 720px) / 2));
      }
    }

    @media (max-width: 520px) {
      .feed-header {
        height: 84px;
        padding-inline: 18px;
      }

      .feed-header>div {
        gap: 18px;
      }

      .feed-header button {
        width: 42px;
        height: 42px;
      }

      .header-icon {
        font-size: 34px;
      }

      .brand-title {
        font-size: 2rem;
      }

      .feed-shell {
        height: calc(100dvh - 84px);
        padding-inline: 18px;
        padding-bottom: calc(118px + env(safe-area-inset-bottom));
      }

      .stories-row {
        gap: 20px;
        margin-block: 34px 46px;
      }

      .story,
      .story-avatar {
        width: 72px;
      }

      .story {
        flex-basis: 72px;
        font-size: 14px;
      }

      .story-avatar {
        height: 72px;
      }

      .feed-list {
        gap: 28px;
      }

      .glass-card {
        border-radius: 9px;
      }

      .feed-card-head {
        gap: 10px;
        padding: 20px 18px 16px;
      }

      .feed-author {
        gap: 14px;
      }

      .feed-avatar {
        width: 52px;
        height: 52px;
        flex-basis: 52px;
        border-width: 3px;
      }

      .skeleton-avatar {
        width: 52px;
        height: 52px;
        flex-basis: 52px;
      }

      .feed-name {
        font-size: 21px;
      }

      .feed-meta {
        font-size: 13px;
      }

      .feed-more {
        width: 36px;
        height: 36px;
        flex-basis: 36px;
      }

      .feed-body {
        padding: 0 18px 22px;
      }

      .feed-text {
        font-size: clamp(1.12rem, 5vw, 1.35rem);
        line-height: 1.55;
      }

      .feed-actions {
        min-height: 76px;
        padding-inline: 8px;
      }

      .skeleton-actions {
        min-height: 70px;
        gap: 10px;
        padding-inline: 14px;
      }

      .feed-action {
        gap: 8px;
        font-size: 16px;
        padding-inline: 4px;
      }

      .feed-action .material-symbols-outlined {
        font-size: 34px;
      }

      .fab {
        right: 22px;
        bottom: calc(104px + env(safe-area-inset-bottom));
        width: 68px;
        height: 68px;
      }

      .fab .material-symbols-outlined {
        font-size: 42px;
      }

      body .mobile-global-nav {
        height: 56px;
        padding: 7px 12px calc(8px + env(safe-area-inset-bottom));
      }

      body .mobile-global-nav a {
        min-width: 58px;
        font-size: 13px;
      }

      body .mobile-global-nav a>.material-symbols-outlined {
        font-size: 20px;
      }

      body .mobile-global-nav a.bg-primary-container {
        min-width: 104px;
      }
    }

    @media (max-width: 380px) {
      .feed-header {
        padding-inline: 12px;
      }

      .feed-header>div {
        gap: 10px;
      }

      .brand-title {
        font-size: 1.78rem;
      }

      .header-icon {
        font-size: 30px;
      }

      .feed-shell {
        padding-inline: 12px;
      }

      .story,
      .story-avatar {
        width: 71px;
      }

      .story {
        flex-basis: 64px;
        font-size: 13px;
      }

      .story-avatar {
        height: 64px;
      }

      .story-add {
        width: 24px;
        height: 24px;
        font-size: 18px;
      }

      .feed-card-head {
        padding-inline: 14px;
      }

      .feed-author {
        gap: 10px;
      }

      .feed-avatar {
        width: 46px;
        height: 46px;
        flex-basis: 46px;
      }

      .skeleton-avatar {
        width: 46px;
        height: 46px;
        flex-basis: 46px;
      }

      .feed-name {
        font-size: 19px;
      }

      .feed-meta {
        font-size: 12px;
      }

      .feed-body {
        padding-inline: 14px;
      }

      .feed-actions {
        min-height: 68px;
        padding-inline: 4px;
      }

      .feed-action {
        gap: 5px;
        font-size: 14px;
      }

      .feed-action .material-symbols-outlined {
        font-size: 29px;
      }

      body .mobile-global-nav {
        padding-inline: 6px;
      }

      body .mobile-global-nav a {
        min-width: 48px;
        font-size: 12px;
      }

      body .mobile-global-nav a.bg-primary-container {
        min-width: 88px;
        padding-inline: 12px;
      }
    }

    @media (max-height: 700px) and (max-width: 520px) {
      .stories-row {
        margin-block: 24px 34px;
      }

      .fab {
        width: 60px;
        height: 60px;
      }
    }

    @media (max-width: 520px) {
      .feed-header {
        height: 43px;
        padding-inline: 5px;
      }

      .feed-header>div {
        gap: 9px;
      }

      .feed-header button {
        width: 24px;
        height: 24px;
      }

      .header-icon {
        font-size: 20px;
      }

      .brand-title {
        font-size: 1rem;
        text-shadow: 0 1px 0 rgba(196, 238, 255, 0.55);
      }

      .feed-shell {
        height: calc(100dvh - 43px);
        padding-inline: 4px;
        padding-bottom: calc(66px + env(safe-area-inset-bottom));
      }

      .stories-row {
        gap: 10px;
        margin-block: 18px 36px;
        padding-block: 6px 10px;
      }

      .story,
      .story-avatar {
        width: 81px;
      }

      .story {
        flex-basis: 43px;
        gap: 7px;
        font-size: 12px;
      }

      .story-avatar {
        height: 81px;
        padding: 2px;
      }

      .story-avatar img {
        border-width: 2px;
      }

      .story-add {
        right: -2px;
        bottom: 1px;
        width: 13px;
        height: 13px;
        border-width: 1px;
        font-size: 11px;
      }

      .feed-list {
        gap: 17px;
      }

      .glass-card {
        border-radius: 7px;
      }

      .feed-card-head {
        gap: 8px;
        padding: 20px 18px 14px;
      }

      .feed-author {
        gap: 12px;
      }

      .feed-avatar {
        width: 42px;
        height: 42px;
        flex-basis: 42px;
        border-width: 2px;
      }

      .skeleton-avatar {
        width: 42px;
        height: 42px;
        flex-basis: 42px;
      }

      .feed-name {
        font-size: 15px;
      }

      .feed-meta {
        margin-top: 4px;
        font-size: 11px;
      }

      .feed-more {
        width: 28px;
        height: 28px;
        flex-basis: 28px;
      }

      .feed-more .material-symbols-outlined {
        font-size: 20px;
      }

      .feed-body {
        padding: 0 18px 20px;
      }

      .feed-text {
        font-size: 16px;
        line-height: 1.58;
      }

      .feed-actions {
        min-height: 66px;
        padding-inline: 30px;
      }

      .skeleton-actions {
        min-height: 58px;
        gap: 8px;
        padding-inline: 18px;
      }

      .skeleton-line.is-title {
        height: 16px;
      }

      .skeleton-line.is-meta,
      .skeleton-line.is-body {
        height: 12px;
      }

      .skeleton-action {
        height: 24px;
      }

      .feed-action {
        gap: 10px;
        border-radius: 8px;
        padding: 8px 2px;
        font-size: 14px;
      }

      .feed-action .material-symbols-outlined {
        font-size: 30px;
      }

      .fab {
        right: 19px;
        bottom: calc(54px + env(safe-area-inset-bottom));
        width: 56px;
        height: 56px;
      }

      .fab .material-symbols-outlined {
        font-size: 35px;
      }
    }

    /* Toast Notifications */
    #toastContainer {
      position: fixed;
      bottom: calc(100px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 5000;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
      width: min(400px, 90vw);
    }

    .toast {
      background: rgba(19, 40, 63, 0.95);
      border: 1px solid rgba(116, 159, 207, 0.3);
      backdrop-filter: blur(12px);
      color: #d3e3ff;
      padding: 16px 20px;
      border-radius: 16px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: toast-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      pointer-events: auto;
    }

    .toast.success {
      border-left: 4px solid #43b8ea;
    }

    .toast.error {
      border-left: 4px solid #ef4444;
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.9);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .toast-out {
      animation: toast-out 0.3s ease forwards;
    }

    @keyframes toast-out {
      to {
        opacity: 0;
        transform: translateY(-10px) scale(0.9);
      }
    }
  </style>
</head>

<body class="bg-surface-deep">
  <header class="feed-header sticky top-0 z-50 flex w-full items-center justify-between px-[30px]">
    <div class="flex items-center gap-8">
      <button class="grid h-12 w-12 place-items-center transition-transform active:scale-95" type="button"

          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <h1 class="brand-title">Orbit</h1>
    </div>
    <div class="flex items-center gap-4 feed-header-actions">
      <button class="grid h-12 w-12 place-items-center transition-transform active:scale-95" type="button"
        aria-label="Search feed">
        <svg class="w-[25px] h-[25px] stroke-current fill-none text-[#b7d7f6]" viewBox="0 0 24 24" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </button>
      <button class="grid h-12 w-12 place-items-center transition-transform active:scale-95" type="button"

        onclick="window.navigateTo ? window.navigateTo('/create-post') : (window.location.href = '/create-post')">

          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </button>
    </div>
  </header>

  <main class="feed-shell">
    <section class="stories-row" aria-label="Stories" id="storiesContainer">
      <button class="story" type="button" onclick="document.getElementById('storyUploadInput').click()">

          <img id="storyCurrentUserAvatar" alt="Your avatar"
            src="https://ui-avatars.com/api/?name=U&background=15324f&color=d3e3ff" />

        </span>
        <span class="w-full truncate text-center text-[#95abc5]">Your Story</span>
      </button>
    </section>
    <input type="file" id="storyUploadInput" accept="image/*,video/*" class="hidden">

    <section class="feed-list" id="feedContainer" aria-label="Feed posts"></section>

    <div id="status" class="status-panel hidden flex-col items-center justify-center gap-4 py-14"></div>
  </main>



  <div
    class="fixed inset-0 z-[3000] hidden flex-col justify-end bg-black/60 backdrop-blur-sm transition-opacity duration-300"
    id="shareModal">
    <div
      class="share-sheet w-full rounded-t-[32px] bg-[#12263f] p-8 pb-12 shadow-[0_-8px_32px_rgba(0,0,0,0.4)] transition-transform duration-300 translate-y-full"
      id="shareSheet">
      <div class="mx-auto mb-8 h-1.5 w-12 rounded-full bg-white/20"></div>

      <div class="mb-8 flex items-center justify-between">
        <h3 class="text-2xl font-bold text-white">Share to...</h3>
        <button id="closeShareModalBtn"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-white/5 text-white transition-colors hover:bg-white/10">
          <svg class="w-5 h-5 stroke-current fill-none" viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>

      <div class="mb-10">
        <div class="mb-4 text-xs font-bold uppercase tracking-widest text-primary/70">Internal Chat</div>
        <div id="shareUserList" class="flex gap-6 overflow-x-auto pb-4 scrollbar-hide">
          <!-- User tiles will be injected here -->
        </div>
      </div>

      <div class="mb-10">
        <div class="mb-6 text-xs font-bold uppercase tracking-widest text-primary/70">External Apps</div>
        <div class="grid grid-cols-3 gap-6">
          <button id="shareWhatsApp" class="flex flex-col items-center gap-3 transition-transform hover:scale-105">
            <div
              class="flex h-16 w-16 items-center justify-center rounded-2xl bg-[#25D366]/10 text-[#25D366] ring-1 ring-[#25D366]/20">
              <svg class="w-8 h-8 stroke-current fill-none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path
                  d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
              </svg>
            </div>
            <span class="text-xs font-medium text-white/80">WhatsApp</span>
          </button>
          <button id="shareInstagram" class="flex flex-col items-center gap-3 transition-transform hover:scale-105">
            <div
              class="flex h-16 w-16 items-center justify-center rounded-2xl bg-[#E1306C]/10 text-[#E1306C] ring-1 ring-[#E1306C]/20">
              <svg class="w-8 h-8 stroke-current fill-none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
              </svg>
            </div>
            <span class="text-xs font-medium text-white/80">Instagram</span>
          </button>
          <button id="shareCopyLink" class="flex flex-col items-center gap-3 transition-transform hover:scale-105">
            <div
              class="flex h-16 w-16 items-center justify-center rounded-2xl bg-white/5 text-white/90 ring-1 ring-white/10">
              <svg class="w-8 h-8 stroke-current fill-none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
              </svg>
            </div>
            <span class="text-xs font-medium text-white/80">Copy Link</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="postContextMenu" class="fixed z-[2500] hidden min-w-[180px] p-2">
    <button
      class="w-full flex items-center gap-3 rounded-xl p-3 text-sm transition-colors hover:bg-white/5 text-[#d3e3ff]"
      id="ctxLike" type="button">

        <path
          d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
      </svg> <span id="ctxLikeText">Like Post</span>
    </button>
    <button
      class="w-full flex items-center gap-3 rounded-xl p-3 text-sm transition-colors hover:bg-white/5 text-[#d3e3ff]"
      id="ctxShare" type="button">
      <svg class="w-5 h-5 stroke-current fill-none text-[#78d2ff]" viewBox="0 0 24 24" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3" />
        <circle cx="6" cy="12" r="3" />
        <circle cx="18" cy="19" r="3" />
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
      </svg> <span>Share Post</span>
    </button>
    <button
      class="w-full flex items-center gap-3 rounded-xl p-3 text-sm transition-colors hover:bg-white/5 text-[#d3e3ff]"

      <svg class="w-5 h-5 stroke-current fill-none text-[#78d2ff]" viewBox="0 0 24 24" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">

        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
      </svg> <span>Copy Link</span>
    </button>
    <button

        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />

    <button

        <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z" />

  <div class="fixed inset-0 z-[2600] hidden items-center justify-center bg-black/80 p-4 backdrop-blur-md"

      <div class="flex gap-3">
        <button type="button" class="flex-1 rounded-2xl bg-white/5 py-4 font-bold transition-colors hover:bg-white/10"

          class="flex-1 rounded-2xl bg-primary py-4 font-bold text-primary-ink transition-opacity hover:opacity-90"

  </div>

  <div class="fixed inset-0 z-[2700] hidden items-center justify-center bg-black/80 p-4 backdrop-blur-md"
    id="confirmModal">
    <div class="share-dialog p-8 w-full max-w-sm text-center">
      <div class="w-16 h-16 bg-red-400/10 text-red-400 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-8 h-8 stroke-current fill-none text-[#ef4444]" viewBox="0 0 24 24" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />

      <img id="storyViewerAvatar" class="w-8 h-8 rounded-full border border-white/20 object-cover" src="" alt="">
      <span id="storyViewerName" class="font-semibold text-sm drop-shadow-md"></span>
      <span id="storyViewerTime" class="text-xs text-white/70 drop-shadow-md ml-2"></span>
    </div>
    <button id="closeStoryViewer"
      class="absolute top-4 right-4 z-10 text-white text-3xl drop-shadow-md opacity-80 hover:opacity-100">&times;</button>

    <div class="relative w-full h-full flex items-center justify-center bg-black/90 select-none"
