<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile - ASCAPDX</title>
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1120;
      --surface: #1e293b;
      --surface-2: #334155;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Geist", "Segoe UI", sans-serif;
      color: var(--text);
      background-color: var(--bg);
      padding-bottom: 40px;
    }
    
    .header {
      display: flex;
      align-items: center;
      padding: 16px;
      gap: 16px;
    }
    .back-btn {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px;
    }

    .edit-container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 24px;
    }

    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }
    .avatar-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid var(--surface-2);
      margin-bottom: 12px;
      cursor: pointer;
    }
    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .edit-icon {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--bg);
    }
    .change-photo-text {
      font-size: 0.8rem;
      font-family: "JetBrains Mono", monospace;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 24px;
    }
    .form-label {
      display: block;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    .form-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      border-color: var(--primary);
    }
    .form-input:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    textarea.form-input {
      resize: vertical;
      min-height: 100px;
      line-height: 1.5;
    }
    .char-count {
      display: block;
      text-align: right;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .save-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      transition: background 0.2s, transform 0.1s;
    }
    .save-btn:hover {
      background: #2563eb;
    }
    .save-btn:active {
      transform: scale(0.98);
    }
    
    #status {
      text-align: center;
      margin-top: 16px;
      font-size: 0.9rem;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" id="backBtn" aria-label="Go back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </button>
    <h1 style="font-size: 1.25rem; font-weight: 600; margin: 0;">Edit Profile</h1>
  </div>

  <div class="edit-container">
    <div class="avatar-section">
      <div class="avatar-wrapper" id="avatarUploadTrigger">
        <img id="avatarPreview" class="avatar-img" src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?auto=format&fit=crop&w=240&q=80" alt="Avatar">
        <div class="edit-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        </div>
      </div>
      <div class="change-photo-text">CHANGE PHOTO</div>
      <input type="file" id="avatarFile" accept="image/*" style="display: none;">
      <input type="hidden" id="avatarUrl">
    </div>

    <div class="form-group">
      <label class="form-label" for="nameInput">Full Name</label>
      <input type="text" id="nameInput" class="form-input" placeholder="Your name">
    </div>

    <div class="form-group">
      <label class="form-label" for="usernameInput">Username</label>
      <input type="text" id="usernameInput" class="form-input" disabled>
    </div>

    <div class="form-group">
      <label class="form-label" for="bioInput">Bio</label>
      <textarea id="bioInput" class="form-input" maxlength="280" placeholder="Tell us about yourself..."></textarea>
      <span class="char-count" id="bioCount">0 / 280</span>
    </div>

    <button class="save-btn" id="saveBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      Save Changes
    </button>
    <div id="status"></div>
  </div>

  <script src="/auth.js"></script>
  <script src="/edit-profile.js"></script>
</body>
</html>
