<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/theme.js"></script>
  <title>Join Groups — ASCAPDX</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0a0f1e;
      --ink-2: #3d4966;
      --ink-3: #8a96b3;
      --paper: #f8f7f4;
      --surface: #ffffff;
      --surface-2: #f2f0ec;
      --line: rgba(0,0,0,0.08);
      --brand: #2755f0;
      --brand-dark: #0d1f6e;
      --brand-light: #eef1ff;
      --brand-mid: #c3ccfc;
      --ok: #00b37e;
      --ok-light: #ecfdf5;
      --r: 16px;
      --r-lg: 26px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
      --shadow: 0 8px 32px rgba(0,0,0,0.09);
      --t: 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 1000px 600px at 100% -5%, rgba(39,85,240,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 700px 500px at -5% 100%, rgba(0,179,126,0.05) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Nav ── */
    .topnav {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 18px 32px;
      border-bottom: 1px solid var(--line);
      background: rgba(248,247,244,0.88);
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem; letter-spacing: -0.02em;
      color: var(--ink); text-decoration: none;
    }
    .logo span { color: var(--brand); }

    .topnav-right { display: flex; gap: 10px; }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 14px;
      background: transparent; border: 1.5px solid var(--line);
      border-radius: 10px; font: inherit; font-size: 0.82rem; font-weight: 600;
      color: var(--ink-2); text-decoration: none; cursor: pointer;
      transition: background var(--t), border-color var(--t), color var(--t);
    }
    .btn-ghost:hover { background: var(--surface); border-color: #c0c8df; color: var(--ink); }

    /* ── Page shell ── */
    .page {
      position: relative; z-index: 1;
      max-width: 1060px; margin: 0 auto;
      padding: 52px 32px 90px;
    }

    /* ── Hero ── */
    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px; align-items: end;
      margin-bottom: 36px;
      animation: fade-up 0.4s ease both;
    }

    .eyebrow {
      font-size: 0.67rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--brand); margin-bottom: 8px;
    }

    .hero-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2.6rem; letter-spacing: -0.04em; line-height: 1.1;
      color: var(--ink); margin-bottom: 10px;
    }

    .hero-sub {
      font-size: 0.9rem; color: var(--ink-3); line-height: 1.65; max-width: 420px;
    }

    .hero-stat {
      text-align: right; flex-shrink: 0;
    }

    .stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 2.8rem; letter-spacing: -0.04em;
      color: var(--brand); line-height: 1;
    }

    .stat-label {
      font-size: 0.75rem; font-weight: 600;
      color: var(--ink-3); text-transform: uppercase;
      letter-spacing: 0.1em; margin-top: 4px;
    }

    /* ── Search bar ── */
    .search-wrap {
      position: relative; margin-bottom: 28px;
      animation: fade-up 0.4s 0.06s ease both;
    }

    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--ink-3); pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      color: var(--ink);
      border: 1.5px solid var(--line);
      border-radius: 16px;
      padding: 15px 18px 15px 46px;
      font: inherit; font-size: 0.95rem;
      outline: none;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--t), box-shadow var(--t);
    }
    .search-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(39,85,240,0.1), var(--shadow-sm);
    }
    .search-input::placeholder { color: var(--ink-3); }

    .search-clear {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px; border-radius: 8px;
      background: var(--surface-2); border: none;
      display: none; align-items: center; justify-content: center;
      color: var(--ink-3); cursor: pointer; font-size: 1rem;
      transition: background var(--t), color var(--t);
    }
    .search-clear:hover { background: #e5e7ef; color: var(--ink); }
    .search-clear.visible { display: flex; }

    /* ── Filter chips ── */
    .filters {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 24px;
      animation: fade-up 0.4s 0.1s ease both;
    }

    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border: 1.5px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      font: inherit; font-size: 0.78rem; font-weight: 600;
      color: var(--ink-2); cursor: pointer;
      transition: background var(--t), border-color var(--t), color var(--t);
    }
    .chip:hover { background: var(--brand-light); border-color: var(--brand-mid); color: var(--brand); }
    .chip.active { background: var(--brand); border-color: var(--brand); color: #fff; }
    .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── Results meta ── */
    .results-meta {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 16px;
      animation: fade-up 0.4s 0.12s ease both;
    }

    .results-count {
      font-size: 0.8rem; font-weight: 600; color: var(--ink-3);
    }

    .results-count strong { color: var(--ink); }

    /* ── Grid ── */
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      animation: fade-up 0.4s 0.14s ease both;
    }

    /* ── Group card ── */
    .group-card {
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: 20px;
      padding: 22px;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--t), border-color var(--t), transform var(--t);
      position: relative; overflow: hidden;
    }
    .group-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--brand), #5878f5);
      opacity: 0;
      transition: opacity var(--t);
    }
    .group-card:hover {
      box-shadow: var(--shadow);
      border-color: var(--brand-mid);
      transform: translateY(-2px);
    }
    .group-card:hover::before { opacity: 1; }

    .group-card-head {
      display: flex; align-items: flex-start; gap: 12px;
    }

    .group-avatar {
      width: 46px; height: 46px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
      border: 1px solid var(--line);
    }

    .group-info { flex: 1; min-width: 0; }

    .group-name {
      font-size: 0.97rem; font-weight: 700; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .group-slug {
      font-size: 0.76rem; font-weight: 600; color: var(--brand);
    }

    .group-owner-row {
      display: flex; align-items: center; gap: 6px;
    }

    .owner-avatar {
      width: 20px; height: 20px; border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-light), var(--brand-mid));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700; color: var(--brand);
      flex-shrink: 0;
    }

    .owner-name {
      font-size: 0.76rem; color: var(--ink-3); font-weight: 500;
    }

    .group-desc {
      font-size: 0.83rem; color: var(--ink-2); line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .group-card-foot {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding-top: 6px;
      border-top: 1px solid var(--line);
    }

    .group-members {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.76rem; color: var(--ink-3); font-weight: 500;
    }

    .member-stack {
      display: flex;
    }
    .member-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: linear-gradient(135deg, #c3ccfc, var(--brand));
      border: 2px solid var(--surface);
      margin-left: -6px;
    }
    .member-dot:first-child { margin-left: 0; }

    .btn-join {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: var(--brand); color: #fff;
      font: inherit; font-size: 0.8rem; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer;
      box-shadow: 0 3px 14px rgba(39,85,240,0.3);
      transition: transform var(--t), box-shadow var(--t), filter var(--t), background var(--t);
      white-space: nowrap;
    }
    .btn-join:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(39,85,240,0.38); filter: brightness(1.06); }
    .btn-join:active { transform: translateY(0); }
    .btn-join.joined {
      background: var(--ok-light); color: var(--ok);
      box-shadow: none; border: 1.5px solid #86efac;
    }
    .btn-join.joined:hover { filter: none; transform: none; }

    /* ── Empty / loading states ── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 56px 24px;
      border: 1.5px dashed #c5cbe0;
      border-radius: 20px;
      background: rgba(255,255,255,0.6);
    }

    .state-icon {
      font-size: 2.6rem; margin-bottom: 14px;
      display: block;
    }

    .state-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem; color: var(--ink-2);
      margin-bottom: 8px;
    }

    .state-sub {
      font-size: 0.85rem; color: var(--ink-3); line-height: 1.65;
      max-width: 300px; margin: 0 auto;
    }

    /* Status */
    .status-bar {
      margin-top: 24px; min-height: 20px;
      font-size: 0.84rem; color: #dc2626;
      animation: fade-up 0.3s ease both;
    }
    .status-bar.ok { color: var(--ok); }

    /* Animations */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .group-card {
      animation: fade-up 0.35s ease both;
    }

    /* Responsive */
    @media (max-width: 720px) {
      .topnav { padding: 14px 18px; }
      .page { padding: 32px 18px 70px; }
      .hero { grid-template-columns: 1fr; gap: 16px; }
      .hero-stat { text-align: left; }
      .hero-title { font-size: 2rem; }
      .groups-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 480px) {
      .hero-title { font-size: 1.75rem; }
      .chip { font-size: 0.74rem; padding: 6px 12px; }
    }
  
    .theme-dark body {
      --ink: #e8eefb;
      --ink-2: #c4d0e7;
      --ink-3: #97a8c9;
      --paper: #081122;
      --surface: #101b32;
      --line: rgba(148, 172, 214, 0.25);
      background: linear-gradient(165deg, #060e1f 0%, #0a1730 55%, #0a1a36 100%);
    }

    .theme-dark .topnav,
    .theme-dark .group-card,
    .theme-dark .chip,
    .theme-dark .search-input,
    .theme-dark .btn-ghost,
    .theme-dark .state-box {
      border-color: rgba(148, 172, 214, 0.3);
      background: #111e37;
      color: #dbe7fb;
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="topnav">
  <a href="/chat" class="logo">ASCAP<span>DX</span></a>
  <div class="topnav-right">
    <a href="/groups" class="btn-ghost">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create group
    </a>
    <a href="/chat" class="btn-ghost">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to chat
    </a>
  </div>
</nav>

<div class="page">

  <!-- Hero -->
  <div class="hero">
    <div>
      <div class="eyebrow">Public groups</div>
      <h1 class="hero-title">Find your people</h1>
      <p class="hero-sub">Browse and join open communities. Private groups are invite-only and won't appear here.</p>
    </div>
    <div class="hero-stat">
      <div class="stat-num" id="totalCount">—</div>
      <div class="stat-label">groups available</div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="search" id="groupSearch" placeholder="Search by name, slug, or owner…" autocomplete="off">
    <button class="search-clear" id="clearSearch" aria-label="Clear search">✕</button>
  </div>

  <!-- Filter chips -->
  <div class="filters">
    <button class="chip active" data-filter="all">
      All groups
    </button>
    <button class="chip" data-filter="popular">
      <span class="chip-dot"></span> Popular
    </button>
    <button class="chip" data-filter="new">
      <span class="chip-dot"></span> Newest
    </button>
    <button class="chip" data-filter="small">
      <span class="chip-dot"></span> Small &amp; cozy
    </button>
  </div>

  <!-- Results count -->
  <div class="results-meta">
    <p class="results-count" id="resultsCount">Loading groups…</p>
  </div>

  <!-- Grid -->
  <div class="groups-grid" id="joinGroupsList">
    <!-- Populated by JS or join-group.js -->
  </div>

  <p class="status-bar" id="status"></p>

</div>



<script src="/auth.js" defer></script>
<script src="/pwa.js" defer></script>
<script src="/join-group.js" defer></script>

<script src="/notifications-loader.js" defer></script>
</body>
</html>
