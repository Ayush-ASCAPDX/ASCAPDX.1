<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - ASCAPDX</title>
  <script src="/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <style>
    :root {
      --bg: #03152a;
      --bg2: #011024;
      --surface: #172a43;
      --surface-2: #1b304b;
      --line: #2f4762;
      --text: #dbe8f8;
      --muted: #95abc5;
      --primary: #43b8ea;
      --primary-ink: #08273a;
      --ok: #2bd39f;
      --danger: #ef4444;
      --shadow-color: rgba(0, 0, 0, 0.3);
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Geist", sans-serif;
      color: var(--text);
      background: radial-gradient(620px 260px at 50% 8%, rgba(67, 184, 234, .15), transparent 70%), linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }

    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    .admin-header h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 12px var(--shadow-color);
    }

    .stat-card h3 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--muted);
      font-weight: 500;
    }

    .stat-card .value {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary);
      margin: 0;
    }

    .tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 12px 24px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .exit-tab { display: none; }
    .nav-icon { font-size: 1.3rem; }
    .nav-text { font-size: inherit; }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .data-table-wrapper {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow-x: auto;
      box-shadow: 0 4px 12px var(--shadow-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    th {
      background: var(--surface-2);
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    .badge.pending { background: #f59e0b20; color: #fcd34d; border: 1px solid #fcd34d40; }
    .badge.resolved { background: #10b98120; color: #6ee7b7; border: 1px solid #6ee7b740; }
    .badge.dismissed { background: #ef444420; color: #fca5a5; border: 1px solid #fca5a540; }

    .action-btns {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      background: var(--surface-2);
      color: var(--text);
      transition: all 0.2s;
    }

    .btn-sm:hover {
      background: var(--line);
    }

    .btn-sm.resolve {
      border-color: var(--ok);
      color: var(--ok);
      background: transparent;
    }
    .btn-sm.resolve:hover { background: var(--ok); color: #000; }

    .btn-sm.dismiss {
      border-color: var(--muted);
      color: var(--muted);
      background: transparent;
    }
    .btn-sm.dismiss:hover { background: var(--muted); color: #000; }

    .btn-sm.danger {
      border-color: var(--danger);
      color: var(--danger);
      background: transparent;
    }
    .btn-sm.danger:hover { background: var(--danger); color: #fff; }

    #toastContainer {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.3s ease-out forwards;
    }

    .toast.success { border-color: var(--ok); }
    .toast.error { border-color: var(--danger); }
    .toast.toast-out { animation: slideOut 0.3s ease-in forwards; }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

    @media (max-width: 600px) {
      .admin-container {
        padding: 16px;
        padding-bottom: 80px;
      }
      .admin-header .btn-sm {
        display: none;
      }
      .admin-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 20px;
        padding-bottom: 12px;
      }
      .admin-header h1 {
        font-size: 1.5rem;
      }
      .stats-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .stat-card {
        padding: 16px;
      }
      .stat-card .value {
        font-size: 1.8rem;
      }
      .tabs {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid var(--line);
        border-bottom: none;
        margin: 0;
        padding: 8px 4px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
        gap: 0;
      }
      .tab-btn {
        flex-direction: column;
        padding: 8px 12px;
        gap: 4px;
        border: none;
        border-radius: 20px;
        width: 72px;
        font-size: 0.75rem;
      }
      .exit-tab {
        display: flex;
      }
      .nav-icon {
        font-size: 1.5rem;
      }
      .tab-btn.active {
        background: rgba(255,255,255,0.15);
        color: var(--text);
        border-bottom: none;
      }
      th, td {
        padding: 12px;
      }
    }

  </style>
</head>
<body>

  <div class="admin-container">
    <header class="admin-header">
      <h1>Admin Dashboard</h1>
      <button class="btn-sm" onclick="window.location.href='/chat'">Exit Admin</button>
    </header>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><h3>Total Users</h3><p class="value" id="statUsers">-</p></div>
      <div class="stat-card"><h3>Total Posts</h3><p class="value" id="statPosts">-</p></div>
      <div class="stat-card"><h3>Pending Reports</h3><p class="value" id="statPending">-</p></div>
      <div class="stat-card"><h3>Resolved Reports</h3><p class="value" id="statResolved">-</p></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('reports')">
        <span class="material-symbols-outlined nav-icon">monitoring</span>
        <span class="nav-text">Reports</span>
      </button>
      <button class="tab-btn" onclick="switchTab('users')">
        <span class="material-symbols-outlined nav-icon">group</span>
        <span class="nav-text">Users</span>
      </button>
      <button class="tab-btn" onclick="switchTab('posts')">
        <span class="material-symbols-outlined nav-icon">article</span>
        <span class="nav-text">Posts</span>
      </button>
      <button class="tab-btn" onclick="switchTab('analytics')">
        <span class="material-symbols-outlined nav-icon">analytics</span>
        <span class="nav-text">Analytics</span>
      </button>
      <button class="tab-btn exit-tab" onclick="window.location.href='/chat'">
        <span class="material-symbols-outlined nav-icon">arrow_back</span>
        <span class="nav-text">Exit</span>
      </button>
    </div>

    <div id="reportsTab" class="tab-content active">
      <div class="data-table-wrapper">
        <table id="reportsTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Reporter</th>
              <th>Reported User</th>
              <th>Reason</th>
              <th>Details</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="7" style="text-align:center;">Loading reports...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="usersTab" class="tab-content">
      <div class="data-table-wrapper">
        <table id="usersTable">
          <thead>
            <tr>
              <th>Joined</th>
              <th>Username</th>
              <th>Name</th>
              <th>Tier</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="5" style="text-align:center;">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="postsTab" class="tab-content">
      <div class="data-table-wrapper">
        <table id="postsTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Author</th>
              <th>Content</th>
              <th>Media</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr><td colspan="5" style="text-align:center;">Loading posts...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="analyticsTab" class="tab-content">
      <div class="data-table-wrapper" style="padding: 24px;">
        <h2 style="margin-top: 0; color: var(--text);">Activity (Last 7 Days)</h2>
        <canvas id="analyticsChart" style="width: 100%; max-height: 400px;"></canvas>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script src="/auth.js"></script>
  <script>
    function showToast(message, type = "success") {
      const container = document.getElementById("toastContainer");
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span class="material-symbols-outlined">${type === 'success' ? 'check_circle' : 'error'}</span> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add("toast-out");
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');
      document.getElementById(`${tabId}Tab`).classList.add('active');
    }

    async function checkAdmin() {
      if (!getToken()) {
        window.location.href = "/";
        return false;
      }
      try {
        const res = await authFetch("/api/admin/check");
        if (!res.ok) throw new Error("Not admin");
        return true;
      } catch (e) {
        window.location.href = "/chat";
        return false;
      }
    }

    async function loadStats() {
      try {
        const res = await authFetch("/api/admin/stats");
        if (!res.ok) return;
        const data = await res.json();
        document.getElementById('statUsers').textContent = data.totalUsers;
        document.getElementById('statPosts').textContent = data.totalPosts;
        document.getElementById('statPending').textContent = data.pendingReports;
        document.getElementById('statResolved').textContent = data.resolvedReports;
      } catch (e) {}
    }

    async function loadReports() {
      try {
        const res = await authFetch("/api/admin/reports");
        const reports = await res.json();
        const tbody = document.querySelector("#reportsTable tbody");
        tbody.innerHTML = reports.length ? '' : '<tr><td colspan="7" style="text-align:center;">No reports found.</td></tr>';
        
        reports.forEach(r => {
          const tr = document.createElement('tr');
          const date = new Date(r.createdAt).toLocaleString();
          
          let actions = '';
          if (r.status === 'pending') {
            actions = `
              <button class="btn-sm resolve" onclick="updateReport('${r._id}', 'resolved')">Resolve</button>
              <button class="btn-sm dismiss" onclick="updateReport('${r._id}', 'dismissed')">Dismiss</button>
            `;
          }

          tr.innerHTML = `
            <td>${date}</td>
            <td><a href="/user-profile?username=${r.reporter}" target="_blank" style="color:var(--primary)">@${r.reporter}</a></td>
            <td><a href="/user-profile?username=${r.reported}" target="_blank" style="color:var(--primary)">@${r.reported}</a></td>
            <td><strong>${r.reason}</strong></td>
            <td style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${r.details}">${r.details || '-'}</td>
            <td><span class="badge ${r.status}">${r.status}</span></td>
            <td class="action-btns">${actions}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        showToast("Failed to load reports", "error");
      }
    }

    async function loadUsers() {
      try {
        const res = await authFetch("/api/admin/users");
        const users = await res.json();
        const tbody = document.querySelector("#usersTable tbody");
        tbody.innerHTML = '';
        
        users.forEach(u => {
          const tr = document.createElement('tr');
          const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'Unknown';
          tr.innerHTML = `
            <td>${date}</td>
            <td><a href="/user-profile?username=${u.username}" target="_blank" style="color:var(--primary)">@${u.username}</a></td>
            <td>${u.name || '-'}</td>
            <td>${u.membershipTier}</td>
            <td class="action-btns">
              <button class="btn-sm danger" onclick="deleteUser('${u.username}')">Delete User</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        showToast("Failed to load users", "error");
      }
    }

    async function updateReport(id, status) {
      if (!confirm(`Mark this report as ${status}?`)) return;
      try {
        const res = await authFetch(`/api/admin/reports/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ status })
        });
        if (res.ok) {
          showToast(`Report marked as ${status}`);
          loadReports();
          loadStats();
        } else {
          showToast("Failed to update report", "error");
        }
      } catch (e) {
        showToast("Error updating report", "error");
      }
    }

    async function deleteUser(username) {
      if (username.toLowerCase() === 'ayush') {
        showToast("Cannot delete an admin user", "error");
        return;
      }
      if (!confirm(`CRITICAL WARNING: Are you sure you want to PERMANENTLY delete @${username} and all their posts/messages?`)) return;
      
      try {
        const res = await authFetch(`/api/admin/users/${username}`, { method: 'DELETE' });
        if (res.ok) {
          showToast(`User @${username} deleted successfully`);
          loadUsers();
          loadStats();
        } else {
          const data = await res.json();
          showToast(data.error || "Failed to delete user", "error");
        }
      } catch (e) {
        showToast("Error deleting user", "error");
      }
    }

    async function loadPosts() {
      try {
        const res = await authFetch("/api/admin/posts");
        const posts = await res.json();
        const tbody = document.querySelector("#postsTable tbody");
        tbody.innerHTML = posts.length ? '' : '<tr><td colspan="5" style="text-align:center;">No posts found.</td></tr>';
        
        posts.forEach(p => {
          const tr = document.createElement('tr');
          const date = new Date(p.timestamp).toLocaleString();
          const media = p.mediaUrl ? `<a href="${p.mediaUrl}" target="_blank" style="color:var(--brand)">[View]</a>` : '-';
          
          tr.innerHTML = `
            <td>${date}</td>
            <td><a href="/user-profile?username=${p.username}" target="_blank" style="color:var(--primary)">@${p.username}</a></td>
            <td style="max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${p.content}">${p.content || '-'}</td>
            <td>${media}</td>
            <td class="action-btns">
              <button class="btn-sm danger" onclick="deletePost('${p._id}')">Delete Post</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (e) {
        showToast("Failed to load posts", "error");
      }
    }

    async function deletePost(id) {
      if (!confirm("Are you sure you want to PERMANENTLY delete this post?")) return;
      try {
        const res = await authFetch(`/api/admin/posts/${id}`, { method: 'DELETE' });
        if (res.ok) {
          showToast("Post deleted successfully");
          loadPosts();
          loadStats();
        } else {
          showToast("Failed to delete post", "error");
        }
      } catch (e) {
        showToast("Error deleting post", "error");
      }
    }

    let chartInstance = null;
    async function loadAnalytics() {
      try {
        const res = await authFetch("/api/admin/analytics");
        if (!res.ok) return;
        const data = await res.json();

        // Prepare chart labels (last 7 days)
        const labels = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          labels.push(d.toISOString().split('T')[0]);
        }

        const usersData = labels.map(label => {
          const found = data.newUsers.find(item => item._id === label);
          return found ? found.count : 0;
        });

        const postsData = labels.map(label => {
          const found = data.newPosts.find(item => item._id === label);
          return found ? found.count : 0;
        });

        const ctx = document.getElementById('analyticsChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        
        Chart.defaults.color = '#95abc5';
        chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              {
                label: 'New Users',
                data: usersData,
                borderColor: '#43b8ea',
                backgroundColor: 'rgba(67, 184, 234, 0.2)',
                borderWidth: 2,
                tension: 0.3,
                fill: true
              },
              {
                label: 'New Posts',
                data: postsData,
                borderColor: '#2bd39f',
                backgroundColor: 'rgba(43, 211, 159, 0.2)',
                borderWidth: 2,
                tension: 0.3,
                fill: true
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: { beginAtZero: true, grid: { color: '#2f4762' } },
              x: { grid: { color: '#2f4762' } }
            },
            plugins: {
              legend: { labels: { color: '#dbe8f8' } }
            }
          }
        });
      } catch (e) {
        console.error("Failed to load analytics", e);
      }
    }

    async function initAdmin() {
      const isAdmin = await checkAdmin();
      if (!isAdmin) return;
      loadStats();
      loadReports();
      loadUsers();
      loadPosts();
      loadAnalytics();
    }

    document.addEventListener("DOMContentLoaded", initAdmin);
  </script>
</body>
</html>
