<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Orbit Chat</title>
  <script src="/theme.js"></script>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Context Menu Styles - Added for chat messages */
    .context-menu {
      position: fixed;
      display: none;
      z-index: 9999;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px;
      min-width: 180px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .context-menu.active {
      display: block;
    }

    .context-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      border-radius: 10px;
      font-size: 0.9rem;
      text-align: left;
      transition: background 0.2s;
    }

    .context-item:hover {
      background: var(--surface-2);
    }

    .context-item.danger {
      color: #ff4b4b;
    }

    .context-item.danger:hover {
      background: rgba(255, 75, 75, 0.1);
    }


    /* Context Emoji Bar */
    .context-emoji-bar {
      display: flex;
      justify-content: space-between;
      gap: 4px;
      padding: 4px 4px 8px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 4px;
    }

    .emoji-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: transform 0.1s, background 0.2s;
    }

    .emoji-btn:hover {
      transform: scale(1.2);
      background: var(--surface-2);
    }

    /* Edit Indicator */
    #editIndicator {
      grid-area: meta;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface-2);
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--brand);
      border: 1px solid var(--line);
      margin-bottom: 6px;
    }

    #replyIndicator {
      grid-area: meta;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface-2);
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      border: 1px solid var(--line);
      margin-bottom: 6px;
    }

    /* Message Reactions UI */
    .message-reactions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    .reaction-badge {
      display: flex;
      align-items: center;
      gap: 3px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 2px 6px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: transform 0.1s;
      color: var(--text);
    }

    .reaction-badge:hover {
      transform: scale(1.1);
    }

    .reaction-badge.mine {
      border-color: var(--brand);
      background: rgba(37, 99, 235, 0.1);
    }

    /* Forward Modal Styles */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 10, 25, 0.85);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      padding: 16px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .share-modal {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      color: var(--text);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    .modal-title {
      margin: 0 0 16px;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .share-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .share-user-list {
      max-height: 240px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 6px;
    }

    .share-user-list::-webkit-scrollbar {
      width: 4px;
    }

    .share-user-list::-webkit-scrollbar-thumb {
      background: var(--line);
      border-radius: 10px;
    }

    .share-user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.02);
    }

    .share-user-item:hover {
      background: var(--surface-2);
      border-color: var(--line);
      transform: translateX(4px);
    }

    .share-user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid var(--line);
    }

    .share-user-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }

    .modal-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--text);
    }

    /* Header Install Button */
    .header-install-btn {
      background: transparent;
      border: none;
      color: var(--brand);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    .header-install-btn:hover {
      background: var(--surface-2);
      transform: scale(1.05);
    }

    .header-install-btn.hidden {
      display: none;
    }

    /* Sidebar Header Avatar */
    .sidebar-header-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--brand, #2563eb);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }

    .sidebar-header-avatar:hover {
      transform: scale(1.08);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.35);
    }

    .sidebar-header-avatar-initials {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #2563eb);
      border: 2px solid rgba(99, 102, 241, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .sidebar-header-avatar-initials:hover {
      transform: scale(1.08);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.35);
    }
  </style>
</head>

        </div>
        <div class="skeleton-row">

          <div class="skeleton-text">
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>

        </div>
        <div class="skeleton-row">

          <div class="skeleton-text">

            <div class="skeleton-line short"></div>

          <div id="chatPartnerAvatar" class="chat-partner-avatar-wrap">

      <div class="chat-messages" id="messages"></div>

      <!-- Background Selection Modal -->

        <div class="theme-modal-content">
          <div class="theme-modal-header">
            <h3>Chat Background</h3>
            <button id="closeThemeModal" class="theme-close-btn">&times;</button>
          </div>
          <div class="theme-options">
            <button class="theme-option" data-theme="default">

      <button id="scrollToBottomBtn" class="scroll-to-bottom-btn hidden" type="button"

      <div id="chatErrorPopup" class="chat-error-popup hidden" role="alert" aria-live="assertive">
        <div class="chat-error-popup-title">Send failed</div>
        <div id="chatErrorPopupText" class="chat-error-popup-text">Something went wrong.</div>
      </div>

      <div class="chat-input">
        <div id="editIndicator" class="hidden">
          <span>✏️ Editing Message</span>
          <button id="cancelEditBtn"
            style="background:none;border:none;color:var(--brand);cursor:pointer;font-weight:bold;font-size:0.7rem;">Cancel</button>
        </div>
        <div id="replyIndicator" class="hidden">
          <div style="display:flex; flex-direction:column; min-width:0; flex:1;">
            <span id="replyTargetUser" style="font-size:0.7rem; color:var(--brand); font-weight:bold;"></span>

          <button id="cancelReplyBtn"

          <span class="file-loader-spinner"></span>
          <span>Sending file...</span>
        </div>
        <textarea id="messageInput" class="chat-input-field " placeholder="Type message..."></textarea>
        <div id="composerMeta" class="composer-meta">Enter to send, Shift+Enter for new line</div>
        <button id="sendBtn" class="chat-send-btn">Send</button>

  <!-- Message Context Menu -->
  <div id="messageContextMenu" class="context-menu" aria-hidden="true">
    <div class="context-emoji-bar">
      <button class="emoji-btn" data-emoji="👍">👍</button>
      <button class="emoji-btn" data-emoji="❤️">❤️</button>
      <button class="emoji-btn" data-emoji="😂">😂</button>
      <button class="emoji-btn" data-emoji="😮">😮</button>
      <button class="emoji-btn" data-emoji="😢">😢</button>
      <button class="emoji-btn" data-emoji="🔥">🔥</button>
    </div>
    <button class="context-item" id="ctxReplyBtn">
      <span>↩️</span> <span>Reply</span>
    </button>
    <button class="context-item" id="ctxForwardBtn">
      <span>➦</span> <span>Forward</span>
    </button>
    <button class="context-item" id="ctxEditBtn">
      <span>✏️</span> <span>Edit Message</span>
    </button>
    <button class="context-item" id="ctxCopyBtn">
      <span>📋</span> <span>Copy Text</span>
    </button>
    <button class="context-item danger" id="ctxDeleteBtn">
      <span>🗑️</span> <span>Delete Message</span>
    </button>
  </div>


  <script>
    (function initSidebarAvatar() {
      function render() {
        const wrap = document.getElementById('sidebarHeaderAvatar');
        if (!wrap) return;
        const raw = localStorage.getItem('user');
        const user = raw ? JSON.parse(raw) : null;
        if (user && user.avatarUrl) {
          const img = document.createElement('img');
          img.src = user.avatarUrl;
          img.alt = user.username || 'Me';
          img.className = 'sidebar-header-avatar';
          img.onerror = function () { renderInitials(wrap, user); };
          wrap.appendChild(img);
        } else if (user) {
          renderInitials(wrap, user);
        } else {
          renderInitials(wrap, { username: '?' });
        }
      }
      function renderInitials(wrap, user) {
        wrap.innerHTML = '';
        const name = user.name || user.username || '?';
        const initials = name.slice(0, 2).toUpperCase();
        const el = document.createElement('div');
        el.className = 'sidebar-header-avatar-initials';
        el.textContent = initials;
        wrap.appendChild(el);
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', render);
      } else {
        render();
      }
    })();
  </script>

  <script src="/auth.js" defer></script>
  <script src="/pwa.js" defer></script>

  <script src="/mobile-nav.js" defer></script>
  <script src="/notifications-loader.js" defer></script>
</body>
