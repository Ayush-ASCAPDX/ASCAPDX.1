<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Sovereign Chat</title>
  <script>
    tailwind = {
      config: {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Poppins", "Segoe UI", "sans-serif"]
            }
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-page font-sans antialiased">
  <div class="auth-card w-[92%] max-w-[420px] max-[990px]:mx-4 max-[640px]:p-5">
    <h1 class="text-2xl font-semibold tracking-tight">Create Account</h1>
    <form id="registerForm" class="auth-form">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>
    <p class="auth-switch">Already have account? <a href="/">Login</a></p>
    <p id="error" class="auth-error"></p>
  </div>

  <script src="/auth.js"></script>
  <script>
    if (getToken()) {
      window.location.href = "/chat";
    }

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      const errorEl = document.getElementById("error");
      errorEl.textContent = "";

      const res = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (!res.ok) {
        errorEl.textContent = data.error || "Registration failed";
        return;
      }

      saveAuth(data.token, data.user);
      window.location.href = "/chat";
    });
  </script>
</body>
</html>
