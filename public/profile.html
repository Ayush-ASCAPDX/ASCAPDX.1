<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - ASCAPDX</title>
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#03152a;
      --bg2:#011024;
      --surface:#172a43;
      --surface-2:#1b304b;
      --line:#2f4762;
      --text:#dbe8f8;
      --muted:#95abc5;
      --primary:#43b8ea;
      --primary-ink:#08273a;
      --ok:#2bd39f;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100dvh;
      font-family:"Geist","Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(620px 260px at 50% 8%, rgba(67,184,234,.15), transparent 70%),
        linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
      padding-bottom:100px;
    }
    .profile-shell{max-width:560px;margin:0 auto;padding:12px 16px 24px}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:6px 0 20px}
    .brand-wrap{display:flex;align-items:center;gap:12px}
    .top-avatar{width:42px;height:42px;border-radius:999px;object-fit:cover;border:1px solid #355270}
    .brand{font-size:2.7rem;font-weight:700;letter-spacing:-.02em;color:#7fd2ff}
    .search-btn{border:none;background:transparent;color:#8ed5ff;font-size:1.65rem;cursor:pointer}
    .menu-wrap{position:relative}
    .menu-btn{border:none;background:transparent;color:#8ed5ff;font-size:1.65rem;cursor:pointer}
    .menu-drop{
      position:absolute;right:0;top:calc(100% + 8px);min-width:160px;
      background:#152a44;border:1px solid #38577a;border-radius:12px;padding:6px;display:none;z-index:30;
    }
    .menu-drop.open{display:block}
    .menu-item{
      width:100%;text-align:left;border:none;background:transparent;color:#dbe8f8;
      padding:8px 10px;border-radius:8px;cursor:pointer;font-size:.9rem
    }
    .menu-item:hover{background:#1e3757}

    .hero{text-align:center}
    .avatar-ring-wrap{width:170px;height:170px;margin:0 auto;position:relative}
    .avatar-ring{position:absolute;inset:0;border-radius:999px;padding:5px;background:linear-gradient(180deg,#8cd9ff,#5ec8ff)}
    .avatar-main{width:100%;height:100%;border-radius:999px;object-fit:cover;border:6px solid #031730}
    .online-dot{position:absolute;right:12px;bottom:12px;width:24px;height:24px;border-radius:999px;background:var(--ok);border:4px solid #031730}
    .name{margin:16px 0 6px;font-size:2.2rem;font-weight:700;letter-spacing:-.02em}
    .handle{font-family:"JetBrains Mono",monospace;font-size:1.05rem;color:#8fd4ff}

    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
    .stat-card{background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:16px 8px;text-align:center}
    .stat-label{font-family:"JetBrains Mono",monospace;font-size:.82rem;color:#9db0c8;letter-spacing:.08em}
    .stat-value{margin-top:8px;font-size:2.5rem;font-weight:700;color:#7fd2ff}

    .bio-card{margin-top:16px;background:var(--surface);border:1px solid var(--line);border-radius:28px;padding:20px}
    .kicker{font-family:"JetBrains Mono",monospace;color:#8fd4ff;font-size:.9rem;letter-spacing:.12em}
    .bio-text{margin:12px 0 0;font-size:1.9rem;line-height:1.5;color:#c3d3e8}

    .actions{margin-top:16px;display:flex;flex-direction:column;gap:12px}
    .primary-btn,.ghost-btn{height:60px;border-radius:999px;font-size:2rem;font-weight:600;cursor:pointer}
    .primary-btn{background:var(--primary);border:none;color:var(--primary-ink)}
    .ghost-btn{background:transparent;border:1px solid #7e9ab8;color:#c8d9ed}

    .section-title{margin:16px 0 10px;font-family:"JetBrains Mono",monospace;font-size:1.1rem;letter-spacing:.12em;color:#8fd4ff}
    .setting-list{display:flex;flex-direction:column;gap:10px}
    .setting-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:16px 18px;color:#cfddef;font-size:1.7rem}

    .hidden-form{display:none}
    #status{min-height:20px;margin-top:10px;color:#86efac}

    @media (max-width:480px){
      .brand{font-size:2rem}
      .avatar-ring-wrap{width:128px;height:128px}
      .online-dot{width:20px;height:20px;right:8px;bottom:8px}
      .name{font-size:1.85rem}
      .handle{font-size:.9rem}
      .stat-card{padding:13px 6px;border-radius:18px}
      .stat-label{font-size:.67rem}
      .stat-value{font-size:1.95rem}
      .bio-card{padding:16px;border-radius:22px}
      .kicker{font-size:.74rem}
      .bio-text{font-size:1rem}
      .primary-btn,.ghost-btn{height:52px;font-size:1.55rem}
      .section-title{font-size:.84rem}
      .setting-item{font-size:1rem}
    }
  </style>
</head>
<body>
  <div class="profile-shell">
    <header class="topbar">
      <div class="brand-wrap">
        <img class="top-avatar" id="avatarPreviewTop" src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?auto=format&fit=crop&w=120&q=80" alt="Avatar">
        <div class="brand">ASCAPDX</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="themeToggleBtn" type="button" class="theme-toggle-btn theme-toggle-btn-inline" aria-label="Toggle theme">Light</button>
        <div class="menu-wrap">
          <button class="menu-btn" id="profileMenuBtn" aria-label="Menu">⋮</button>
          <div class="menu-drop" id="profileMenuDrop">            <button class="menu-item" id="openEditorBtn" type="button">Edit Profile</button>            <button class="menu-item" id="shareProfileBtn" type="button">Share Profile</button>          </div>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="avatar-ring-wrap">
        <div class="avatar-ring">
          <img id="avatarPreview" class="avatar-main" src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?auto=format&fit=crop&w=260&q=80" alt="Profile">
        </div>
        <span class="online-dot"></span>
      </div>
      <h1 id="profileName" class="name">Alex Rivera</h1>
      <p id="profileHandle" class="handle">@arivera_pdx</p>
    </section>



    <section class="bio-card">
      <div class="kicker">BIO</div>
      <p id="profileBioPreview" class="bio-text">Full-stack developer and open-source enthusiast focused on secure communication tools.</p>
    </section>

    <h2 class="section-title">ACCOUNT SETTINGS</h2>
    <section class="setting-list">
      <a class="setting-item" href="/settings"><span>🛡 Account Security</span><span>›</span></a>
      <a class="setting-item" href="/settings"><span>🔔 Notification Settings</span><span>›</span></a>
      <a class="setting-item" href="/settings"><span>🛡 Privacy &amp; Safety</span><span>›</span></a>
      <a class="setting-item" href="/settings"><span>❓ Help &amp; Support</span><span>›</span></a>
    </section>

    <p id="status"></p>

    <form id="profileForm" class="hidden-form">
      <input type="text" id="name" placeholder="Display name">
      <textarea id="bio" maxlength="280"></textarea>
      <input type="text" id="avatarUrl" placeholder="Avatar URL">
      <input type="file" id="avatarFile" accept="image/*">
      <input type="checkbox" id="privateChat">
      <input type="text" id="allowedUsers" placeholder="allowed users">
      <input type="text" id="usernameDisplay" disabled>
      <button type="submit">Save</button>
    </form>
    <button id="upgradeBtn" type="button" class="hidden-form">Upgrade</button>
    <div id="profileTier" class="hidden-form"></div>
    <div id="profileUsernameMeta" class="hidden-form"></div>
    <div id="profilePlanMeta" class="hidden-form"></div>
    <div id="profilePrivacyMeta" class="hidden-form"></div>
    <div id="bioCount" class="hidden-form"></div>
  </div>

  <script src="/auth.js" defer></script>
  <script src="/pwa.js" defer></script>
  <script src="/profile.js" defer></script>
  <script src="/nav-loader.js" defer></script>
  <script src="/mobile-nav.js" defer></script>
  <script>
    document.getElementById("openEditorBtn").addEventListener("click", () => {
      const nameEl = document.getElementById("name");
      const bioEl = document.getElementById("bio");
      const avatarUrlEl = document.getElementById("avatarUrl");
      const privateChatEl = document.getElementById("privateChat");
      const allowedUsersEl = document.getElementById("allowedUsers");

      const nextName = window.prompt("Display name", nameEl.value || "");
      if (nextName === null) return;
      const nextBio = window.prompt("Bio", bioEl.value || "");
      if (nextBio === null) return;
      const nextAvatar = window.prompt("Avatar URL (optional)", avatarUrlEl.value || "");
      if (nextAvatar === null) return;
      const privateChoice = window.confirm("Enable private chat mode?");
      const allowed = window.prompt("Allowed users (comma separated)", allowedUsersEl.value || "");
      if (allowed === null) return;

      nameEl.value = nextName;
      bioEl.value = nextBio;
      avatarUrlEl.value = nextAvatar;
      privateChatEl.checked = privateChoice;
      allowedUsersEl.value = allowed;

      document.getElementById("profileForm").requestSubmit();
    });
    document.getElementById("shareProfileBtn").addEventListener("click", async () => {
      const url = window.location.href;
      try {
        if (navigator.share) {
          await navigator.share({ title: "ASCAPDX Profile", url });
          return;
        }
        await navigator.clipboard.writeText(url);
        document.getElementById("status").textContent = "Profile link copied.";
      } catch (_) {}
    });
    const syncTopAvatar = () => {
      const main = document.getElementById("avatarPreview");
      const top = document.getElementById("avatarPreviewTop");
      if (main && top) top.src = main.src;
    };
    setInterval(syncTopAvatar, 500);
    const profileMenuBtn = document.getElementById("profileMenuBtn");
    const profileMenuDrop = document.getElementById("profileMenuDrop");
    const profileCreateBtn = document.getElementById("profileCreateBtn");
    profileMenuBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      profileMenuDrop.classList.toggle("open");
    });
    document.addEventListener("click", () => {
      profileMenuDrop.classList.remove("open");
    });
    profileCreateBtn.addEventListener("click", () => {
      window.location.href = "/groups";
    });
  </script>
</body>
</html>
